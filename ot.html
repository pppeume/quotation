<title>대웅그룹 OT 운영관리 플랫폼</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard Variable','Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;overflow:hidden;}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f0f2f5;z-index:9999;flex-direction:column;gap:12px;font-size:14px;color:#64748b;}
#loading .spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#error-box{display:none;position:fixed;inset:0;background:#fef2f2;z-index:9998;padding:40px;font-family:monospace;font-size:13px;color:#991b1b;overflow:auto;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
input[type=checkbox]{accent-color:#6366f1;cursor:pointer;}
select:focus,input:focus,textarea:focus{border-color:#6366f1!important;outline:none;box-shadow:0 0 0 3px rgba(99,102,241,0.1);}
@media print{.no-print{display:none!important;}}
</style>
</head>

<div id="loading"><div class="spinner"></div><div>대웅그룹 OT 운영관리 플랫폼 로딩중...</div></div>
<div id="error-box"></div>
<div id="root"></div>

<script>
window.onerror=function(msg,src,line,col,err){
  document.getElementById('loading').style.display='none';
  var eb=document.getElementById('error-box');
  eb.style.display='block';
  eb.innerHTML='<h2 style="margin-bottom:12px;">오류 발생</h2><p>'+msg+'</p><p>줄 '+line+'</p><pre>'+(err?err.stack:'')+'</pre><p style="margin-top:20px;">페이지를 새로고침(F5)하세요.</p>';
};
</script>

function makeSeed(emps, siteNames) {
  var out = [];
  var rsn = ["마감 대응","긴급 이슈","서버 복구","고객 대응","정기 점검","마이그레이션","배포 준비","보안 패치"];

  var sts = ["SUBMITTED","APPROVED1","APPROVED","REJECTED","APPROVED","APPROVED","SUBMITTED","APPROVED","APPROVED","DRAFT"];
  for (var i = 0; i < 72; i++) {
    var e = emps[i % emps.length], s = sts[i % sts.length], m = (i % 3) + 1, d = Math.min(28, Math.floor(Math.random() * 27) + 1);
    var sh = 17 + Math.floor(Math.random() * 3), dur = 1 + Math.floor(Math.random() * 4);
    out.push({
      id:"OT-2026-" + String(i + 1).padStart(4, "0"), eId:e.id, eNm:e.nm, site:e.site, dept:e.dept, role:e.role,

      hol:Math.random() > 0.75, ngt:sh >= 22 || Math.random() > 0.8, status:s,
      apr1:apprs[0].nm, apr2:apprs[1].nm,
      ap2Op:s === "APPROVED" ? "승인합니다" : "",

      subAt:s !== "DRAFT" ? "2026-" + String(m).padStart(2, "0") + "-" + String(d).padStart(2, "0") + " 16:30" : null,
      apAt:s === "APPROVED" ? "2026-" + String(m).padStart(2, "0") + "-" + String(d).padStart(2, "0") + " 10:30" : null,

function DashPage(props) {

  /* ── 날짜 유틸 ── */
  var today = new Date(2026, 2, 24); /* 2026-03-24 */
  var todayStr = "2026-03-24";

  function getWeekRange(dt) {
    var d2 = new Date(dt); var day = d2.getDay() || 7;
    var mon = new Date(d2); mon.setDate(mon.getDate() - day + 1);
    var sun = new Date(mon); sun.setDate(sun.getDate() + 6);
    return {start:fmtD(mon), end:fmtD(sun)};
  }
  function fmtD(dt) { return dt.getFullYear() + "-" + String(dt.getMonth() + 1).padStart(2, "0") + "-" + String(dt.getDate()).padStart(2, "0"); }
  function getMonthRange(dt) { var y = dt.getFullYear(), m = dt.getMonth(); var last = new Date(y, m + 1, 0).getDate(); return {start:y + "-" + String(m + 1).padStart(2, "0") + "-01", end:y + "-" + String(m + 1).padStart(2, "0") + "-" + String(last).padStart(2, "0")}; }
  function getYearRange(dt) { var y = dt.getFullYear(); return {start:y + "-01-01", end:y + "-12-31"}; }

  var empD = emps.map(function(e) { return {l:e.nm, v:ap.filter(function(r) { return r.eId === e.id; }).reduce(function(a, r) { return a + r.hrs; }, 0)}; }).sort(function(a, b) { return b.v - a.v; }).slice(0, 8);
  var typeD = OT_TYPES.map(function(t) { return {l:t, v:ap.filter(function(r) { return r.otType === t; }).length}; });

  var fBtn = function(p) { return {padding:"7px 16px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:period === p ? 700 : 500,fontSize:12,background:period === p ? "#6366f1" : "#f1f5f9",color:period === p ? "#fff" : "#64748b",transition:"all 0.15s"}; };

/* ═══════════════════════════════════════════════════════════
   견적 시뮬레이션 (QUOTATION TOOL)
   대웅 그룹사 건물종합관리용역 도급내역서 기반
   ═══════════════════════════════════════════════════════════ */

/* 숫자 유틸 */
function r10(n) { return Math.round((Number(n) || 0) / 10) * 10; }            /* ROUND(x,-1) */
function r0(n) { return Math.round(Number(n) || 0); }                          /* ROUND(x,0) */
function nf(n) { return Math.round(Number(n) || 0).toLocaleString("ko-KR"); }  /* 천단위 콤마 */
function won(n) { return "₩" + nf(n); }

/* 기본 설정값 (법령·정책 변경 시 설정에서 관리) */
var Q_DEF_SET = {
  weekHours: 209,      /* 주간직 기본시간 */
  shiftHours: 213,     /* 교대직 기본시간 */
  stdHours: 9,         /* 소정근로시간 */
  minWage: 10030,      /* 해당년도 법정최저시급 (편집 가능) */
  rPension: 4.75,      /* 국민연금 % */
  rAccident: 0.860,    /* 산재보험 % */
  rHealth: 3.595,      /* 건강보험 % */
  rEmploy: 1.75,       /* 고용보험 % */
  rCare: 0.5,          /* 장기요양 % */
  rBizTax: 12.95,      /* 사업소세 (건강보험 대비) % */
  adminRate: 5.0,      /* 일반관리비 % */
  profitRate: 10.0,    /* 기업이윤 % */
  vat: 10.0            /* 부가세 % */
};

var Q_SEED_ROWS = [
  {id:"q1",label:"시설관리 (주간)",area:"시설",count:3,workType:"week",hourly:11000,basic:2400000,posPay:200000,qualPay:50000,otHours:0,otApply:false,ntHours:0,ntApply:false,annualDays:10},
  {id:"q2",label:"보안 (교대)",area:"보안",count:4,workType:"shift",hourly:10500,basic:2300000,posPay:0,qualPay:0,otHours:34,otApply:true,ntHours:60,ntApply:true,annualDays:10},
  {id:"q3",label:"미화 (주간)",area:"미화",count:6,workType:"week",hourly:10100,basic:2096270,posPay:0,qualPay:0,otHours:0,otApply:false,ntHours:0,ntApply:false,annualDays:10}
];
var Q_SEED_GEN = [
  {id:"g1",nm:"피복비",unit:120000,qty:1,nightBased:false},
  {id:"g2",nm:"특수검진비",unit:80000,qty:1,nightBased:false},
  {id:"g3",nm:"선물비",unit:100000,qty:1,nightBased:false},
  {id:"g4",nm:"운영비",unit:50000,qty:1,nightBased:false},
  {id:"g5",nm:"특수검진비(야간)",unit:60000,qty:1,nightBased:true}
];
var Q_SEED_OTH = [
  {id:"o1",nm:"수수료",unit:30000,qty:1},
  {id:"o2",nm:"식대",unit:220000,qty:1}
];

/* 한 인원(직군) 행의 모든 파생값 계산 — 모든 금액은 1인 기준 */
function qCalcRow(r, s) {
  var baseHours = r.workType === "shift" ? s.shiftHours : s.weekHours;
  var basic = Number(r.basic) || 0, pos = Number(r.posPay) || 0, qual = Number(r.qualPay) || 0;
  var common = r0((basic + pos) / baseHours);                 /* 통상시급 = ROUND((기본급여+직책수당)/기본시간,0) */
  var ot = r.otApply ? r10((Number(r.otHours) || 0) * common * 1.5) : 0;
  var nt = r.ntApply ? r10((Number(r.ntHours) || 0) * common * 0.5) : 0;
  var annual = r10(s.stdHours * common * (Number(r.annualDays) || 0) / 12);
  var directBase = basic + pos + qual + ot + nt + annual;     /* 기본급여~연차수당 합 */
  var retire = r10(directBase / 12);                          /* 퇴직충당금 */
  var directSum = directBase + retire;                        /* 직접인건비 소계 */
  var monthlyPay = directSum - retire - annual;              /* 월급여(실지급) = 소계−퇴직충당금−연차수당 */
  /* 간접인건비 — 기준은 directBase (퇴직충당금 제외) */
  var pension = r0(directBase * s.rPension / 100);
  var accident = r0(directBase * s.rAccident / 100);
  var health = r0(directBase * s.rHealth / 100);
  var employ = r0(directBase * s.rEmploy / 100);
  var care = r0(directBase * s.rCare / 100);
  var bizTax = r0(health * s.rBizTax / 100);
  var indirectSum = pension + accident + health + employ + care + bizTax;
  return {baseHours:baseHours, common:common, ot:ot, nt:nt, annual:annual, directBase:directBase,
    retire:retire, directSum:directSum, monthlyPay:monthlyPay, pension:pension, accident:accident,
    health:health, employ:employ, care:care, bizTax:bizTax, indirectSum:indirectSum,
    belowMin: (Number(r.hourly) || 0) < s.minWage};
}

/* 전체 견적 집계 */
function qCalcAll(rows, gen, oth, s) {
  var totalHead = rows.reduce(function(a, r) { return a + (Number(r.count) || 0); }, 0);
  var nightHead = rows.reduce(function(a, r) { return a + (r.ntApply ? (Number(r.count) || 0) : 0); }, 0);
  var genTotal = gen.reduce(function(a, g) { return a + (g.nightBased ? (Number(g.unit) || 0) * nightHead : (Number(g.unit) || 0) * (Number(g.qty) || 0)); }, 0);
  var othTotal = oth.reduce(function(a, o) { return a + (Number(o.unit) || 0) * (Number(o.qty) || 0); }, 0);
  var etcTotal = genTotal + othTotal;                          /* 기타비용 총계 */
  var allocPerHead = totalHead > 0 ? etcTotal / totalHead : 0; /* 1인당 기타비용 배분 */
  var calc = rows.map(function(r) {
    var c = qCalcRow(r, s);
    c.etc = allocPerHead;
    c.junggye = c.directSum + c.indirectSum + c.etc;           /* 중계 = 직접+간접+기타 */
    c.admin = r0(c.junggye * s.adminRate / 100);               /* 일반관리비 */
    c.profit = r0((c.junggye + c.admin) * s.profitRate / 100); /* 기업이윤 */
    c.exVat = c.junggye + c.admin + c.profit;                  /* 월간합계 부가세별도 (1인) */
    c.inVat = r0(c.exVat * (1 + s.vat / 100));                 /* 월간합계 부가세포함 (1인) */
    var cnt = Number(r.count) || 0;
    c.count = cnt;
    c.rowExVat = c.exVat * cnt;
    c.rowInVat = c.inVat * cnt;
    c.rowIndirect = c.indirectSum * cnt;                       /* 행 간접인건비 (조정불가) */
    return c;
  });
  var totalExVat = calc.reduce(function(a, c) { return a + c.rowExVat; }, 0);
  var totalIndirect = calc.reduce(function(a, c) { return a + c.rowIndirect; }, 0);
  var totalInVat = r0(totalExVat * (1 + s.vat / 100));
  return {calc:calc, totalHead:totalHead, nightHead:nightHead, genTotal:genTotal, othTotal:othTotal,
    etcTotal:etcTotal, allocPerHead:allocPerHead, totalExVat:totalExVat, totalInVat:totalInVat,
    totalIndirect:totalIndirect};
}

/* 엑셀(견적서 양식) 다운로드 — 외부 라이브러리 없이 .xls(HTML) 생성 */
function qExportExcel(rows, gen, oth, s, agg, prices) {
  var th = "border:1px solid #999;padding:5px 8px;background:#f2f2f2;font-weight:bold;text-align:center;";
  var td = "border:1px solid #999;padding:5px 8px;text-align:right;";
  var tdL = "border:1px solid #999;padding:5px 8px;text-align:left;";
  var h = "";
  h += "<table style='border-collapse:collapse;font-family:맑은 고딕,Malgun Gothic;font-size:12px;'>";
  h += "<tr><td colspan='13' style='font-size:20px;font-weight:bold;text-align:center;padding:14px;'>견  적  서</td></tr>";
  h += "<tr><td colspan='13' style='text-align:right;padding:4px 8px;'>작성일: " + (new Date().toISOString().slice(0,10)) + "</td></tr>";
  h += "<tr><td colspan='13' style='padding:4px 8px;'>건명: 대웅 그룹사 건물종합관리용역</td></tr>";
  h += "<tr>" + ["직군/구분","인원","월급여","직접인건비","간접인건비","기타비용","중계","일반관리비","기업이윤","1인 단가(부가세별도)","행 합계(부가세별도)","부가세포함"].map(function(x, i) { return "<th style='" + th + "'>" + x + "</th>"; }).join("") + "</tr>";
  rows.forEach(function(r, i) {
    var c = agg.calc[i];
    var unit = prices && prices[r.id] != null ? prices[r.id] : c.exVat;     /* 확정 단가 우선 */
    var rowSum = unit * c.count;
    h += "<tr>";
    h += "<td style='" + tdL + "'>" + r.label + "</td>";
    h += "<td style='" + td + "'>" + c.count + "</td>";
    h += "<td style='" + td + "'>" + nf(c.monthlyPay) + "</td>";
    h += "<td style='" + td + "'>" + nf(c.directSum) + "</td>";
    h += "<td style='" + td + "'>" + nf(c.indirectSum) + "</td>";
    h += "<td style='" + td + "'>" + nf(c.etc) + "</td>";
    h += "<td style='" + td + "'>" + nf(c.junggye) + "</td>";
    h += "<td style='" + td + "'>" + nf(c.admin) + "</td>";
    h += "<td style='" + td + "'>" + nf(c.profit) + "</td>";
    h += "<td style='" + td + "'>" + nf(unit) + "</td>";
    h += "<td style='" + td + "'>" + nf(rowSum) + "</td>";
    h += "<td style='" + td + "'>" + nf(r0(rowSum * (1 + s.vat / 100))) + "</td>";
    h += "</tr>";
  });
  var gExVat = prices ? rows.reduce(function(a, r, i) { var u = prices[r.id] != null ? prices[r.id] : agg.calc[i].exVat; return a + u * agg.calc[i].count; }, 0) : agg.totalExVat;
  h += "<tr><td colspan='10' style='" + th + "text-align:right;'>합계 (부가세 별도)</td><td colspan='2' style='" + td + "font-weight:bold;'>" + nf(gExVat) + "</td></tr>";
  h += "<tr><td colspan='10' style='" + th + "text-align:right;'>합계 (부가세 포함)</td><td colspan='2' style='" + td + "font-weight:bold;'>" + nf(r0(gExVat * (1 + s.vat / 100))) + "</td></tr>";
  h += "</table>";
  /* 기타비용 내역 */
  h += "<br/><table style='border-collapse:collapse;font-family:맑은 고딕;font-size:12px;'>";
  h += "<tr><td colspan='4' style='font-weight:bold;padding:6px;'>[ 기타비용 내역 ]</td></tr>";

          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14}}>
            <div><label style={lblS}>사업소 *</label><select style={Object.assign({}, inpS, {background:"#fff"})} defaultValue={empM.site} onChange={function(e) { empM.site = e.target.value; }}>{siteNames.map(function(s) { return <option key={s}>{s}</option>; })}</select></div>
            <div><label style={lblS}>업무 *</label><select style={Object.assign({}, inpS, {background:"#fff"})} defaultValue={empM.area} onChange={function(e) { empM.area = e.target.value; empM.dept = e.target.value + "팀"; }}><option value="시설">시설</option><option value="미화">미화</option><option value="보안">보안</option><option value="식음">식음</option><option value="기타">기타</option></select></div>
            <div><label style={lblS}>역할 *</label><select style={Object.assign({}, inpS, {background:"#fff"})} defaultValue={empM.sysRole} onChange={function(e) { empM.sysRole = e.target.value; empM.role = e.target.value === "manager" ? "소장" : e.target.value === "worker" ? "반장" : "사원"; }}><option value="manager">사업소장 (결재권한)</option><option value="worker">담당자</option><option value="viewer">열람자</option></select></div>
          </div>
          <div style={{background:"#f8fafc",borderRadius:8,padding:12,marginBottom:18,fontSize:11,color:"#64748b",lineHeight:1.7}}>
            <b>역할별 권한 안내</b><br />
            · <span style={{color:"#10b981",fontWeight:600}}>사업소장</span> — 결재 승인/반려 + OT 신청 + 모든 메뉴<br />
            · <span style={{color:"#f59e0b",fontWeight:600}}>담당자</span> — OT 신청 + 분석 조회<br />
            · <span style={{color:"#94a3b8",fontWeight:600}}>열람자</span> — OT 신청 + 대시보드/내역 조회
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            {empM.nm && <button style={Object.assign({}, bSm, {color:"#ef4444",borderColor:"#fecaca",padding:"8px 14px"})} onClick={function() { if (confirm(empM.nm + " 회원을 삭제하시겠습니까?")) handleDeleteEmp(empM.id); }}>🗑 회원 삭제</button>}
            {!empM.nm && <div />}
            <div style={{display:"flex",gap:8}}>
              <button style={bDef} onClick={function() { setEmpM(null); }}>취소</button>
              <button style={bPri} onClick={function() {
                var e = Object.assign({}, empM);
                if (!e.nm || !e.email) { alert("이름과 이메일은 필수입니다."); return; }
                if (allEmps.find(function(x) { return x.id === e.id; })) {
                  handleSaveEmp(e);
                } else {
                  setAllEmps(function(prev) { return prev.concat([e]); });
                  setEmpM(null); doToast("신규 회원 등록됨");
                }
              }}>저장</button>
            </div>
          </div>
        </div>
      </div>}

      {toast && <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#0f172a",color:"#fff",padding:"12px 28px",borderRadius:12,fontSize:13,fontWeight:600,boxShadow:"0 8px 32px rgba(0,0,0,0.25)",zIndex:2000}}>✅ {toast}</div>}
    </div>
  );
}


document.getElementById("loading").style.display="none";
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
} catch(err) {
  document.getElementById("loading").style.display="none";
  var eb=document.getElementById("error-box");
  eb.style.display="block";
  eb.innerHTML="<h2>앱 실행 오류</h2><pre>"+err.message+"\n"+err.stack+"</pre>";
}
</script>
</body>
</html>
