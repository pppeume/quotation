<body>

<script>
window.onerror=function(msg,src,line,col,err){
  var l=document.getElementById('loading'); if(l) l.style.display='none';
  var eb=document.getElementById('error-box');
  eb.style.display='block';
  eb.innerHTML='<h2 style="margin-bottom:12px;">오류 발생</h2><p>'+msg+'</p><p>줄 '+line+'</p><pre>'+(err?err.stack:'')+'</pre><p style="margin-top:20px;">페이지를 새로고침(F5)하세요.</p>';
};
</script>

  throw new Error('CDN load failed');
}

function NumInput(p){

/* ═══ 기본 설정값 (법령·정책 변경 시 설정에서 관리) ═══ */
var Q_DEF_SET={ weekHours:209, shiftHours:213, stdHours:9, minWage:10320,
  rPension:4.75, rAccident:0.860, rHealth:3.595, rEmploy:1.75, rCare:0.5, rBizTax:12.95,
  adminRate:5.0, profitRate:10.0, vat:10.0 };
var Q_PANEL_KEYS=["weekHours","shiftHours","stdHours","minWage","rPension","rAccident","rHealth","rEmploy","rCare","rBizTax","vat"];
function qPick(o){ var r={}; Q_PANEL_KEYS.forEach(function(k){ r[k]=o[k]; }); return r; }
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function loadHist(){ try{ return JSON.parse((window.localStorage&&localStorage.getItem("quotation_history"))||"[]"); }catch(e){ return []; } }
function saveHistLS(h){ try{ if(window.localStorage) localStorage.setItem("quotation_history",JSON.stringify(h)); }catch(e){} }

/* 직군 구분 및 직군별 단가 카탈로그 */
var Q_AREAS=["시설","미화","보안","식음"];
function defCatalog(){
  var gen=[{nm:"피복비",unit:120000},{nm:"특수검진비",unit:80000},{nm:"선물비",unit:100000},{nm:"운영비",unit:50000}];
  var oth=[{nm:"명절선물",unit:100000},{nm:"법정교육비",unit:30000},{nm:"수수료",unit:30000},{nm:"식대",unit:220000}];
  var c={};
  Q_AREAS.forEach(function(a){ c[a]={gen:gen.map(function(x){return {id:uid("cg"),nm:x.nm,unit:x.unit};}),oth:oth.map(function(x){return {id:uid("co"),nm:x.nm,unit:x.unit};})}; });
  return c;
}

/* 새 인원(직군) 행 — 인원 추가 시 제경비·기타경비 1줄씩 자동 생성 */
function newRow(s){
  return {id:uid("q"),label:"",area:"시설",count:1,workType:"week",baseHours:s.weekHours,stdHours:s.stdHours,
    basic:"",posPay:"",qualPay:"",otHours:"",otApply:false,ntHours:"",ntApply:false,annualDays:10,
    genItems:[{id:uid("gi"),nm:"",unit:"",qty:1}], othItems:[{id:uid("oi"),nm:"",unit:"",qty:1}]};
}

/* 한 인원(직군) 행의 모든 파생값 — 모든 금액은 1인 기준 */
function qCalcRow(r,s){
  var baseHours = Number(r.baseHours)||(r.workType==="shift"?s.shiftHours:s.weekHours);
  var stdHours = Number(r.stdHours)||s.stdHours;
  var basic=Number(r.basic)||0, pos=Number(r.posPay)||0, qual=Number(r.qualPay)||0;
  var common = r0((basic+pos)/baseHours);                       /* 통상시급 = ROUND((기본급여+직책수당)/기본시간,0) */
  var hourly = r0(basic/baseHours);                             /* 시간급 = ROUND(기본급여/기본근로시간) */
  var ot = r.otApply ? r10((Number(r.otHours)||0)*common*1.5) : 0;
  var nt = r.ntApply ? r10((Number(r.ntHours)||0)*common*0.5) : 0;
  var annual = r10(stdHours*common*(Number(r.annualDays)||0)/12);
  var directBase = basic+pos+qual+ot+nt+annual;
  var retire = r10(directBase/12);
  var directSum = directBase+retire;
  var monthlyPay = directSum-retire-annual;
  var pension=r0(directBase*s.rPension/100), accident=r0(directBase*s.rAccident/100),
      health=r0(directBase*s.rHealth/100), employ=r0(directBase*s.rEmploy/100),
      care=r0(directBase*s.rCare/100), bizTax=r0(health*s.rBizTax/100);
  var indirectSum = pension+accident+health+employ+care+bizTax;
  /* 기타비용 — 각 직군 행에 개별 입력 (1인당 단가) */
  var etcGenPer=(r.genItems||[]).reduce(function(a,g){return a+(Number(g.unit)||0)*(Number(g.qty)||0);},0);
  var etcOthPer=(r.othItems||[]).reduce(function(a,o){return a+(Number(o.unit)||0)*(Number(o.qty)||0);},0);
  return {baseHours:baseHours,stdHours:stdHours,common:common,hourly:hourly,ot:ot,nt:nt,annual:annual,
    directBase:directBase,retire:retire,directSum:directSum,monthlyPay:monthlyPay,pension:pension,accident:accident,
    health:health,employ:employ,care:care,bizTax:bizTax,indirectSum:indirectSum,
    etcGenPer:etcGenPer,etcOthPer:etcOthPer,etc:etcGenPer+etcOthPer,belowMin:hourly<s.minWage};
}

function qCalcAll(rows,s){
  var totalHead=rows.reduce(function(a,r){return a+(Number(r.count)||0);},0);
  var calc=rows.map(function(r){
    var c=qCalcRow(r,s);
    var cnt=Number(r.count)||0; c.count=cnt;
    c.rowEtc=c.etc*cnt;
    c.junggye=c.directSum+c.indirectSum+c.etc;                  /* 중계 = 직접+간접+기타 */
    c.admin=r0(c.junggye*s.adminRate/100);                      /* 일반관리비 */
    c.profit=r0((c.junggye+c.admin)*s.profitRate/100);          /* 기업이윤 */
    c.exVat=c.junggye+c.admin+c.profit;                         /* 부가세별도 (1인) */
    c.inVat=r0(c.exVat*(1+s.vat/100));                          /* 부가세포함 (1인) */
    c.rowExVat=c.exVat*cnt; c.rowInVat=c.inVat*cnt; c.rowIndirect=c.indirectSum*cnt;
    return c;
  });
  var etcTotal=calc.reduce(function(a,c){return a+c.rowEtc;},0);
  var totalExVat=calc.reduce(function(a,c){return a+c.rowExVat;},0);
  var totalIndirect=calc.reduce(function(a,c){return a+c.rowIndirect;},0);
  var totalInVat=r0(totalExVat*(1+s.vat/100));
  return {calc:calc,totalHead:totalHead,etcTotal:etcTotal,totalExVat:totalExVat,totalInVat:totalInVat,totalIndirect:totalIndirect};
}

/* 엑셀(견적서 양식) 다운로드 — 외부 라이브러리 없이 .xls(HTML) 생성 */
function qExportExcel(rows,s,agg,prices){
  var th="border:1px solid #999;padding:5px 8px;background:#dbe5f1;font-weight:bold;text-align:center;";
  var td="border:1px solid #999;padding:5px 8px;text-align:right;";
  var tdL="border:1px solid #999;padding:5px 8px;text-align:left;";
  var h="<table style='border-collapse:collapse;font-family:맑은 고딕,Malgun Gothic;font-size:12px;'>";
  h+="<tr><td colspan='12' style='font-size:20px;font-weight:bold;text-align:center;padding:14px;'>견  적  서</td></tr>";
  h+="<tr><td colspan='12' style='text-align:right;padding:4px 8px;'>작성일: "+(new Date().toISOString().slice(0,10))+"</td></tr>";
  h+="<tr><td colspan='12' style='padding:4px 8px;'>건명: 건물종합관리용역</td></tr>";
  h+="<tr>"+["직군/구분","인원","월급여","직접인건비","간접인건비","기타비용","중계","일반관리비","기업이윤","1인 단가(부가세별도)","행 합계(부가세별도)","부가세포함"].map(function(x){return "<th style='"+th+"'>"+x+"</th>";}).join("")+"</tr>";
  rows.forEach(function(r,i){
    var c=agg.calc[i];
    var unit=prices&&prices[r.id]!=null?prices[r.id]:c.exVat;
    var rowSum=unit*c.count;
    h+="<tr><td style='"+tdL+"'>"+(r.label||"(직군명)")+"</td><td style='"+td+"'>"+c.count+"</td><td style='"+td+"'>"+nf(c.monthlyPay)+"</td><td style='"+td+"'>"+nf(c.directSum)+"</td><td style='"+td+"'>"+nf(c.indirectSum)+"</td><td style='"+td+"'>"+nf(c.etc)+"</td><td style='"+td+"'>"+nf(c.junggye)+"</td><td style='"+td+"'>"+nf(c.admin)+"</td><td style='"+td+"'>"+nf(c.profit)+"</td><td style='"+td+"'>"+nf(unit)+"</td><td style='"+td+"'>"+nf(rowSum)+"</td><td style='"+td+"'>"+nf(r0(rowSum*(1+s.vat/100)))+"</td></tr>";
  });
  var gExVat=prices?rows.reduce(function(a,r,i){var u=prices[r.id]!=null?prices[r.id]:agg.calc[i].exVat;return a+u*agg.calc[i].count;},0):agg.totalExVat;
  h+="<tr><td colspan='10' style='"+th+"text-align:right;'>합계 (부가세 별도)</td><td colspan='2' style='"+td+"font-weight:bold;'>"+nf(gExVat)+"</td></tr>";
  h+="<tr><td colspan='10' style='"+th+"text-align:right;'>합계 (부가세 포함)</td><td colspan='2' style='"+td+"font-weight:bold;'>"+nf(r0(gExVat*(1+s.vat/100)))+"</td></tr></table>";
  h+="<br/><table style='border-collapse:collapse;font-family:맑은 고딕;font-size:12px;'><tr><td colspan='5' style='font-weight:bold;padding:6px;'>[ 기타비용 내역 (직군별, 1인당 단가) ]</td></tr>";
  h+="<tr><th style='"+th+"'>직군</th><th style='"+th+"'>구분</th><th style='"+th+"'>항목</th><th style='"+th+"'>단가 × 수량</th><th style='"+th+"'>1인당 금액</th></tr>";
  rows.forEach(function(r){
    (r.genItems||[]).forEach(function(g){ h+="<tr><td style='"+tdL+"'>"+(r.label||"")+"</td><td style='"+tdL+"'>제경비</td><td style='"+tdL+"'>"+(g.nm||"")+"</td><td style='"+td+"'>"+nf(g.unit)+" × "+(Number(g.qty)||0)+"</td><td style='"+td+"'>"+nf((Number(g.unit)||0)*(Number(g.qty)||0))+"</td></tr>"; });
    (r.othItems||[]).forEach(function(o){ h+="<tr><td style='"+tdL+"'>"+(r.label||"")+"</td><td style='"+tdL+"'>기타경비</td><td style='"+tdL+"'>"+(o.nm||"")+"</td><td style='"+td+"'>"+nf(o.unit)+" × "+(Number(o.qty)||0)+"</td><td style='"+td+"'>"+nf((Number(o.unit)||0)*(Number(o.qty)||0))+"</td></tr>"; });
  });
  h+="</table>";
  var html="<html><head><meta charset='UTF-8'></head><body>"+h+"</body></html>";
  var blob=new Blob(["﻿",html],{type:"application/vnd.ms-excel;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url; a.download="견적서_"+(new Date().toISOString().slice(0,10))+".xls";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}

function NameCell(p){ return <td style={Object.assign({},tdL,{fontWeight:600,position:"sticky",left:0,background:"#fff",borderRight:"1px solid "+LINE})}>{p.label||<span style={{color:SUB,fontWeight:400}}>(직군명)</span>} <span style={{color:SUB,fontWeight:400}}>×{p.count}</span></td>; }

function QuotationPage(){
  var _s=useState(Q_DEF_SET), set=_s[0], setSet=_s[1];
  var _ds=useState(function(){return qPick(Q_DEF_SET);}), draft=_ds[0], setDraft=_ds[1];
  var _r=useState([]), rows=_r[0], setRows=_r[1];
  var _cat=useState(function(){return defCatalog();}), catalog=_cat[0], setCatalog=_cat[1];
  var _scat=useState(false), showCat=_scat[0], setShowCat=_scat[1];
  var _ctab=useState("시설"), catTab=_ctab[0], setCatTab=_ctab[1];
  var _sp=useState(0), simPct=_sp[0], setSimPct=_sp[1];
  var _ts=useState(null), toast=_ts[0], setToast=_ts[1];
  var _ti=useState(""), title=_ti[0], setTitle=_ti[1];
  var _hi=useState(function(){return loadHist();}), hist=_hi[0], setHist=_hi[1];
  var _shh=useState(false), showHist=_shh[0], setShowHist=_shh[1];
  function doToast(m){ setToast(m); setTimeout(function(){setToast(null);},2500); }
  function mk(k,v){var o={};o[k]=v;return o;}

  var agg=useMemo(function(){return qCalcAll(rows,set);},[rows,set]);
  var empty=rows.length===0;
  /* 시뮬레이션: 기본급여를 simPct(%) 만큼 조정 → 전체 재계산 */
  var simFactor=1+simPct/100;
  var simRows=useMemo(function(){return rows.map(function(r){return Object.assign({},r,{basic:r0((Number(r.basic)||0)*simFactor)});});},[rows,simFactor]);
  var simAgg=useMemo(function(){return qCalcAll(simRows,set);},[simRows,set]);

  /* 인원 행 */
  function updRow(id,k,v){ setRows(function(p){return p.map(function(r){return r.id===id?Object.assign({},r,mk(k,v)):r;});}); }
  function setWorkType(id,wt){ setRows(function(p){return p.map(function(r){return r.id===id?Object.assign({},r,{workType:wt,baseHours:wt==="shift"?set.shiftHours:set.weekHours}):r;});}); }
  function addRow(){ setRows(function(p){return p.concat([newRow(set)]);}); }
  function delRow(id){ setRows(function(p){return p.filter(function(r){return r.id!==id;});}); }
  /* 행 내부 제경비 */
  function updGenItem(rid,iid,k,v){ setRows(function(p){return p.map(function(r){return r.id!==rid?r:Object.assign({},r,{genItems:r.genItems.map(function(g){return g.id===iid?Object.assign({},g,mk(k,v)):g;})});});}); }
  function addGenItem(rid){ setRows(function(p){return p.map(function(r){return r.id!==rid?r:Object.assign({},r,{genItems:r.genItems.concat([{id:uid("gi"),nm:"",unit:"",qty:1}])});});}); }
  function delGenItem(rid,iid){ setRows(function(p){return p.map(function(r){return r.id!==rid?r:Object.assign({},r,{genItems:r.genItems.filter(function(g){return g.id!==iid;})});});}); }
  /* 행 내부 기타경비 */
  function updOthItem(rid,iid,k,v){ setRows(function(p){return p.map(function(r){return r.id!==rid?r:Object.assign({},r,{othItems:r.othItems.map(function(o){return o.id===iid?Object.assign({},o,mk(k,v)):o;})});});}); }
  function addOthItem(rid){ setRows(function(p){return p.map(function(r){return r.id!==rid?r:Object.assign({},r,{othItems:r.othItems.concat([{id:uid("oi"),nm:"",unit:"",qty:1}])});});}); }
  function delOthItem(rid,iid){ setRows(function(p){return p.map(function(r){return r.id!==rid?r:Object.assign({},r,{othItems:r.othItems.filter(function(o){return o.id!==iid;})});});}); }
  /* 카탈로그에서 종류 선택 → 단가 자동 */
  function selGenItem(rid,iid,nm,unit){ setRows(function(p){return p.map(function(r){return r.id!==rid?r:Object.assign({},r,{genItems:r.genItems.map(function(g){return g.id===iid?Object.assign({},g,{nm:nm,unit:unit}):g;})});});}); }
  function selOthItem(rid,iid,nm,unit){ setRows(function(p){return p.map(function(r){return r.id!==rid?r:Object.assign({},r,{othItems:r.othItems.map(function(o){return o.id===iid?Object.assign({},o,{nm:nm,unit:unit}):o;})});});}); }
  /* 카탈로그 편집 */
  function updCat(area,type,iid,k,v){ setCatalog(function(p){var c=clone(p); c[area][type]=c[area][type].map(function(x){return x.id===iid?Object.assign({},x,mk(k,v)):x;}); return c;}); }
  function addCat(area,type){ setCatalog(function(p){var c=clone(p); c[area][type]=c[area][type].concat([{id:uid("c"),nm:"",unit:0}]); return c;}); }
  function delCat(area,type,iid){ setCatalog(function(p){var c=clone(p); c[area][type]=c[area][type].filter(function(x){return x.id!==iid;}); return c;}); }
  /* 설정 */
  function updSet(k,v){ setSet(function(p){return Object.assign({},p,mk(k,v));}); }
  function updDraft(k,v){ setDraft(function(p){return Object.assign({},p,mk(k,v));}); }
  function applySettings(){
    setSet(function(p){return Object.assign({},p,draft);});
    setRows(function(p){return p.map(function(r){return Object.assign({},r,{baseHours:r.workType==="shift"?draft.shiftHours:draft.weekHours,stdHours:draft.stdHours});});});
    doToast("설정이 적용되어 왼쪽 표·계산에 반영되었습니다.");
  }
  function resetDraft(){ setDraft(qPick(set)); doToast("설정 입력을 되돌렸습니다."); }
  var setDirty=Q_PANEL_KEYS.some(function(k){ return String(draft[k])!==String(set[k]); });

  function applySim(){ setRows(simRows); setSimPct(0); doToast("조정된 기본급여가 적용되어 ①~⑥ 전체에 반영되었습니다."); }
  function resetSim(){ setSimPct(0); doToast("기준(0%)으로 초기화"); }
  function doSave(){ var e={id:uid("h"),title:title||"제목 없음",savedAt:new Date().toLocaleString("ko-KR"),total:agg.totalExVat,head:agg.totalHead,rows:clone(rows),set:clone(set),catalog:clone(catalog)}; var nh=[e].concat(hist); setHist(nh); saveHistLS(nh); doToast("견적서가 저장되었습니다."); }
  function doLoadHist(e){ setRows(clone(e.rows||[])); setSet(clone(e.set||Q_DEF_SET)); setDraft(qPick(e.set||Q_DEF_SET)); if(e.catalog) setCatalog(clone(e.catalog)); setTitle(e.title||""); setSimPct(0); setShowHist(false); doToast("저장된 견적서를 불러왔습니다."); }
  function doDelHist(id){ var nh=hist.filter(function(x){return x.id!==id;}); setHist(nh); saveHistLS(nh); doToast("삭제되었습니다."); }

  var sumCard={background:"#fff",border:"1px solid "+LINE,borderRadius:8,padding:"14px 16px"};
  var sumLbl={fontSize:11.5,color:SUB,marginBottom:5};
  var sumVal={fontSize:19,fontWeight:800,color:BLUE,letterSpacing:"-.3px"};
  var grpTt={fontSize:11.5,fontWeight:700,color:BLUE,borderBottom:"1px solid "+LINE,paddingBottom:6,marginBottom:9};
  var setRow={display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,gap:8};
  var setLbl={fontSize:11.5,color:INK};
  var stbl={borderCollapse:"collapse",fontSize:12,width:"100%"};

  return (
    <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
    <div style={{flex:1,minWidth:0}}>
      {/* 견적서 제목 · 히스토리 */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <span style={{fontSize:13,fontWeight:700,color:BLUE,whiteSpace:"nowrap"}}>📋 견적서</span>
        <input value={title} onChange={function(e){setTitle(e.target.value);}} placeholder="견적서 제목 입력 (예: 마곡연구소 건물관리 2026)" style={{flex:1,minWidth:220,padding:"10px 14px",borderRadius:7,border:"1px solid "+LINE,fontSize:14.5,fontWeight:700,color:INK}} />
        <button style={bDef} onClick={doSave}>💾 저장</button>
        <button style={Object.assign({},bSm,{padding:"8px 14px"})} onClick={function(){setShowHist(true);}}>🕘 히스토리 ({hist.length})</button>
      </div>
      {/* 상단 요약 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
        <div style={sumCard}><div style={sumLbl}>총 인원</div><div style={Object.assign({},sumVal,{color:INK})}>{agg.totalHead}<span style={{fontSize:13,fontWeight:400,color:SUB}}> 명</span></div></div>
        <div style={sumCard}><div style={sumLbl}>간접인건비 (조정불가)</div><div style={Object.assign({},sumVal,{color:INK})}>{won(agg.totalIndirect)}</div></div>
        <div style={sumCard}><div style={sumLbl}>총 견적금액 (부가세 별도)</div><div style={sumVal}>{won(agg.totalExVat)}</div></div>
        <div style={Object.assign({},sumCard,{background:BLUE,border:"1px solid "+BLUE})}><div style={Object.assign({},sumLbl,{color:"#bcd0e6"})}>총 견적금액 (부가세 포함)</div><div style={Object.assign({},sumVal,{color:"#fff"})}>{won(agg.totalInVat)}</div></div>
      </div>

      {/* 1. 인원 · 근무시간 */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13}}>
          <div style={secHd}><span style={secNo}>1</span><span style={secTt}>인원 · 근무시간</span></div>
          <button style={bPri} onClick={addRow}>+ 인원 추가</button>
        </div>
        <div style={{fontSize:11.5,color:SUB,marginBottom:10}}>「+ 인원 추가」로 직군을 하나씩 추가하세요. 추가 시 ④기타비용에 제경비·기타경비 입력란이 1줄씩 함께 생성됩니다.</div>
        {empty ? <div style={emptyBox}>아직 등록된 인원이 없습니다. 오른쪽 위 <b style={{color:BLUE}}>「+ 인원 추가」</b> 를 눌러 시작하세요.</div> :
        <div style={tableWrap}><table style={tbl}>
          <thead><tr>
            <th style={thL}>직군/구분</th><th style={thC}>업무 구분</th><th style={thC}>근무형태</th><th style={thS}>인원 수</th><th style={thS}>기본근로시간</th><th style={thS}>소정근로시간</th><th style={thS}>시간급</th><th style={thS}>통상시급</th><th style={thC}></th>
          </tr></thead>
          <tbody>{rows.map(function(r){
            var c=qCalcRow(r,set);
            return <tr key={r.id}>
              <td style={tdL}><TxtInput w={130} value={r.label} ph="직군명 입력" onChange={function(v){updRow(r.id,"label",v);}} /></td>
              <td style={tdC}><select value={r.area} onChange={function(e){updRow(r.id,"area",e.target.value);}} style={{padding:"6px 6px",borderRadius:5,border:"1px solid "+LINE,fontSize:12.5}}>{Q_AREAS.map(function(a){return <option key={a} value={a}>{a}</option>;})}</select></td>
              <td style={tdC}><select value={r.workType} onChange={function(e){setWorkType(r.id,e.target.value);}} style={{padding:"6px 6px",borderRadius:5,border:"1px solid "+LINE,fontSize:12.5}}><option value="week">주간직</option><option value="shift">교대직</option></select></td>
              <td style={tdS}><NumInput w={54} value={r.count} onChange={function(v){updRow(r.id,"count",v);}} /></td>
              <td style={tdS}><NumInput w={66} value={r.baseHours} onChange={function(v){updRow(r.id,"baseHours",v);}} /></td>
              <td style={tdS}><NumInput w={54} value={r.stdHours} onChange={function(v){updRow(r.id,"stdHours",v);}} /></td>
              <td style={Object.assign({},tdS,{fontWeight:600,color:c.belowMin?WARN:INK})}>{nf(c.hourly)}{c.belowMin&&<div style={{fontSize:9.5,color:WARN,marginTop:2}}>최저시급 미만</div>}</td>
              <td style={Object.assign({},tdS,{fontWeight:700})}>{nf(c.common)}</td>
              <td style={tdC}><DelBtn onClick={function(){delRow(r.id);}} /></td>
            </tr>;
          })}</tbody>
        </table></div>}
        {!empty && <div style={{fontSize:11,color:SUB,marginTop:8,lineHeight:1.7}}>🔹 기본근로시간: 주간직 {set.weekHours} / 교대직 {set.shiftHours} (근무형태 선택 시 자동 입력, 수정 가능)<br/>🔹 <b style={{color:INK}}>시간급</b> = ROUND(기본급여 ÷ 기본근로시간)<br/>🔹 <b style={{color:INK}}>통상시급</b> = ROUND((기본급여+직책수당) ÷ 기본근로시간) → <b style={{color:BLUE}}>②기본급여</b> 입력 시 자동 계산</div>}
      </div>

      {/* 2. 직접인건비 */}
      <div style={card}>
        <div style={secHd}><span style={secNo}>2</span><span style={secTt}>직접인건비 계산</span></div>
        {empty ? <div style={emptyBox}>① 인원을 먼저 추가하세요.</div> :
        <div style={tableWrap}><table style={tbl}>
          <thead><tr>
            <th style={thL}>직군</th><th style={thS}>기본급여</th><th style={thS}>직책·자격수당</th><th style={thC}>연장</th><th style={thS}>연장근로수당</th><th style={thC}>야간</th><th style={thS}>야간근로수당</th><th style={thS}>연차일</th><th style={thS}>연차수당</th><th style={thS}>퇴직충당금</th><th style={thS}>소계</th>
          </tr></thead>
          <tbody>{rows.map(function(r){
            var c=qCalcRow(r,set);
            return <tr key={r.id}>
              <NameCell label={r.label} count={r.count} />
              <td style={tdS}><NumInput w={96} value={r.basic} onChange={function(v){updRow(r.id,"basic",v);}} /></td>
              <td style={tdS}><NumInput w={84} value={r.posPay} onChange={function(v){updRow(r.id,"posPay",v);}} /></td>
              <td style={tdC}><div style={{display:"flex",alignItems:"center",gap:5,justifyContent:"flex-end"}}><input type="checkbox" checked={r.otApply} onChange={function(e){updRow(r.id,"otApply",e.target.checked);}} title="적용(미체크=해당없음)" /><NumInput w={48} value={r.otHours} onChange={function(v){updRow(r.id,"otHours",v);}} /><span style={{fontSize:9.5,color:SUB}}>h</span></div></td>
              <td style={tdS}>{r.otApply?nf(c.ot):<span style={{color:SUB}}>해당없음</span>}</td>
              <td style={tdC}><div style={{display:"flex",alignItems:"center",gap:5,justifyContent:"flex-end"}}><input type="checkbox" checked={r.ntApply} onChange={function(e){updRow(r.id,"ntApply",e.target.checked);}} title="적용(미체크=해당없음)" /><NumInput w={48} value={r.ntHours} onChange={function(v){updRow(r.id,"ntHours",v);}} /><span style={{fontSize:9.5,color:SUB}}>h</span></div></td>
              <td style={tdS}>{r.ntApply?nf(c.nt):<span style={{color:SUB}}>해당없음</span>}</td>
              <td style={tdS}><NumInput w={42} value={r.annualDays} onChange={function(v){updRow(r.id,"annualDays",v);}} /></td>
              <td style={tdS}>{nf(c.annual)}</td>
              <td style={tdS}>{nf(c.retire)}</td>
              <td style={Object.assign({},tdS,{fontWeight:700})}>{nf(c.directSum)}</td>
            </tr>;
          })}</tbody>
          <tfoot><tr><td style={tfL}>합계</td><td colSpan="9" style={tfR}></td><td style={tfR}>{nf(agg.calc.reduce(function(a,c){return a+c.directSum*c.count;},0))}</td></tr></tfoot>
        </table></div>}
        {!empty && <div style={{fontSize:11,color:SUB,marginTop:8,lineHeight:1.7}}>🔹 연장 = ROUND(연장시간×통상시급×1.5, -1)　🔹 야간 = ROUND(야간시간×통상시급×0.5, -1)　🔹 연차 = ROUND(소정근로시간×통상시급×연차일÷12, -1)　🔹 퇴직충당금 = ROUND(소계(기본급여~연차수당)÷12, -1)</div>}
      </div>

      {/* 3. 간접인건비 */}
      <div style={card}>
        <div style={secHd}><span style={secNo}>3</span><span style={secTt}>간접인건비 계산 (4대보험 + 세금)</span></div>
        {empty ? <div style={emptyBox}>① 인원을 먼저 추가하세요.</div> :
        <div style={tableWrap}><table style={tbl}>
          <thead><tr>
            <th style={thL}>직군</th><th style={thS}>국민연금</th><th style={thS}>산재보험</th><th style={thS}>건강보험</th><th style={thS}>고용보험</th><th style={thS}>장기요양</th><th style={thS}>사업소세</th><th style={thS}>소계</th>
          </tr></thead>
          <tbody>{rows.map(function(r){
            var c=qCalcRow(r,set);
            return <tr key={r.id}>
              <NameCell label={r.label} count={r.count} />
              <td style={tdS}>{nf(c.pension)}</td><td style={tdS}>{nf(c.accident)}</td><td style={tdS}>{nf(c.health)}</td>
              <td style={tdS}>{nf(c.employ)}</td><td style={tdS}>{nf(c.care)}</td><td style={tdS}>{nf(c.bizTax)}</td>
              <td style={Object.assign({},tdS,{fontWeight:700})}>{nf(c.indirectSum)}</td>
            </tr>;
          })}</tbody>
          <tfoot><tr><td style={tfL}>합계</td><td colSpan="6" style={tfR}></td><td style={tfR}>{nf(agg.totalIndirect)}</td></tr></tfoot>
        </table></div>}
        {!empty && <div style={{fontSize:11,color:SUB,marginTop:8,lineHeight:1.7}}>🔹 기준: 기본급여~연차수당 합 (퇴직충당금 제외)<br/>🔹 요율: 국민연금 {set.rPension}% / 산재 {set.rAccident}% / 건강 {set.rHealth}% / 고용 {set.rEmploy}% / 장기요양 {set.rCare}%　🔹 사업소세 = 건강보험 × {set.rBizTax}% (요율은 ⚙ 설정에서 관리)</div>}
      </div>

      {/* 4. 기타 비용 (직군별 개별 입력) */}
      <div style={card}>
        <div style={secHd}><span style={secNo}>4</span><span style={secTt}>기타 비용 (직군별 개별 입력)</span></div>
        <div style={{fontSize:11.5,color:SUB,marginBottom:12}}>각 직군의 <b>업무 구분</b>에 맞는 제경비·기타경비 <b>종류를 선택</b>하면 단가가 자동으로 채워집니다. <b>수량만</b> 입력하세요. 단가는 1인당 기준이며 직군 인원수만큼 적용됩니다. 종류·단가는 오른쪽 <b style={{color:BLUE}}>📋 직군별 단가 설정</b>에서 관리합니다.</div>
        {empty ? <div style={emptyBox}>① 인원을 추가하면 직군별 제경비·기타경비 입력란이 생성됩니다.</div> :
        <div>
          {rows.map(function(r,i){
            var c=agg.calc[i];
            return <div key={r.id} style={{border:"1px solid "+LINE,borderRadius:7,padding:12,marginBottom:10}}>
              <div style={{fontSize:12.5,fontWeight:700,color:INK,marginBottom:10,paddingBottom:8,borderBottom:"1px solid "+LINE,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                <span>{r.label||<span style={{color:SUB}}>(직군명)</span>} <span style={{fontWeight:600,color:BLUE,fontSize:11,background:BLUEL,padding:"2px 8px",borderRadius:10}}>{r.area}</span> <span style={{color:SUB,fontWeight:400}}>× {r.count}명</span></span>
                <span style={{fontWeight:400,color:SUB}}>1인당 기타 <b style={{color:INK}}>{won(c.etc)}</b> · 직군 합계 <b style={{color:BLUE}}>{won(c.rowEtc)}</b></span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}><span style={{fontSize:12,fontWeight:700,color:INK}}>제경비 (1인당)</span><button style={bSm} onClick={function(){addGenItem(r.id);}}>+ 행 추가</button></div>
                  <table style={stbl}><thead><tr><th style={Object.assign({},thL,{fontSize:10.5})}>종류</th><th style={Object.assign({},thS,{fontSize:10.5})}>단가(자동)</th><th style={Object.assign({},thS,{fontSize:10.5})}>수량</th><th style={Object.assign({},thS,{fontSize:10.5})}>금액</th><th style={thC}></th></tr></thead>
                    <tbody>{r.genItems.map(function(g){
                      var cg=(catalog[r.area]&&catalog[r.area].gen)||[];
                      return <tr key={g.id}>
                        <td style={tdL}><select value={g.nm} onChange={function(e){var nm=e.target.value;var it=cg.filter(function(x){return x.nm===nm;})[0];selGenItem(r.id,g.id,nm,it?it.unit:0);}} style={{width:118,padding:"6px",borderRadius:5,border:"1px solid "+LINE,fontSize:12}}><option value="">종류 선택</option>{cg.map(function(x){return <option key={x.id} value={x.nm}>{x.nm}</option>;})}</select></td>
                        <td style={tdS}>{g.nm?nf(g.unit):<span style={{color:SUB}}>-</span>}</td>
                        <td style={tdS}><NumInput w={42} value={g.qty} onChange={function(v){updGenItem(r.id,g.id,"qty",v);}} /></td>
                        <td style={Object.assign({},tdS,{fontWeight:600})}>{nf((Number(g.unit)||0)*(Number(g.qty)||0))}</td>
                        <td style={tdC}><DelBtn onClick={function(){delGenItem(r.id,g.id);}} /></td>
                      </tr>;
                    })}</tbody>
                    <tfoot><tr><td style={tfL} colSpan="3">제경비 (1인당)</td><td style={tfR} colSpan="2">{nf(c.etcGenPer)}</td></tr></tfoot>
                  </table>
                </div>
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}><span style={{fontSize:12,fontWeight:700,color:INK}}>기타경비 (1인당)</span><button style={bSm} onClick={function(){addOthItem(r.id);}}>+ 행 추가</button></div>
                  <table style={stbl}><thead><tr><th style={Object.assign({},thL,{fontSize:10.5})}>종류</th><th style={Object.assign({},thS,{fontSize:10.5})}>단가(자동)</th><th style={Object.assign({},thS,{fontSize:10.5})}>수량</th><th style={Object.assign({},thS,{fontSize:10.5})}>금액</th><th style={thC}></th></tr></thead>
                    <tbody>{r.othItems.map(function(o){
                      var co=(catalog[r.area]&&catalog[r.area].oth)||[];
                      return <tr key={o.id}>

              <tr key={r.id+"_a"}>

                <table style={{borderCollapse:"collapse",width:"100%",fontSize:12.5}}><thead><tr><th style={Object.assign({},thL,{fontSize:10.5})}>종류</th><th style={Object.assign({},thS,{fontSize:10.5})}>단가</th><th style={thC}></th></tr></thead>
                  <tbody>{list.map(function(x){return <tr key={x.id}>
                    <td style={tdL}><TxtInput w="100%" value={x.nm} ph="종류명" onChange={function(v){updCat(catTab,tp[0],x.id,"nm",v);}} /></td>
                    <td style={tdS}><NumInput w={100} value={x.unit} onChange={function(v){updCat(catTab,tp[0],x.id,"unit",v);}} /></td>
                    <td style={tdC}><DelBtn onClick={function(){delCat(catTab,tp[0],x.id);}} /></td>
                  </tr>;})}</tbody>
                </table>
                {list.length===0 && <div style={{fontSize:11,color:SUB,padding:"10px 0",textAlign:"center"}}>등록된 종류가 없습니다. + 종류 추가</div>}
              </div>;
            })}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:18}}><button style={bPri} onClick={function(){setShowCat(false);doToast("단가 설정이 저장되었습니다.");}}>완료</button></div>
        </div>
      </div>}

      {toast && <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:BLUED,color:"#fff",padding:"11px 26px",borderRadius:8,fontSize:13,fontWeight:600,boxShadow:"0 6px 24px rgba(0,0,0,.2)",zIndex:2000}}>{toast}</div>}
    </div>
  );
}

document.getElementById("loading").style.display="none";
ReactDOM.createRoot(document.getElementById("root")).render(<QuotationPage/>);
} catch(err) {
  document.getElementById("loading").style.display="none";
  var eb=document.getElementById("error-box");
  eb.style.display="block";
  eb.innerHTML="<h2>앱 실행 오류</h2><pre>"+err.message+"\n"+err.stack+"</pre>";
}
</script>
</body>
</html>
