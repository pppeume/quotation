   ═══════════════════════════════════════════════════════════ */

/* 숫자 유틸 */
function r10(n) { return Math.round((Number(n) || 0) / 10) * 10; }            /* ROUND(x,-1) */
function r0(n) { return Math.round(Number(n) || 0); }                          /* ROUND(x,0) */
function nf(n) { return Math.round(Number(n) || 0).toLocaleString("ko-KR"); }  /* 천단위 콤마 */

};

  {id:"q1",label:"시설관리 (주간)",area:"시설",count:3,workType:"week",hourly:11000,basic:2400000,posPay:200000,qualPay:50000,otHours:0,otApply:false,ntHours:0,ntApply:false,annualDays:10},

  {id:"q3",label:"미화 (주간)",area:"미화",count:6,workType:"week",hourly:10100,basic:2096270,posPay:0,qualPay:0,otHours:0,otApply:false,ntHours:0,ntApply:false,annualDays:10}
];

/* 한 인원(직군) 행의 모든 파생값 계산 — 모든 금액은 1인 기준 */
function qCalcRow(r, s) {
  var baseHours = r.workType === "shift" ? s.shiftHours : s.weekHours;
  var basic = Number(r.basic) || 0, pos = Number(r.posPay) || 0, qual = Number(r.qualPay) || 0;
  var common = r0((basic + pos) / baseHours);                 /* 통상시급 = ROUND((기본급여+직책수당)/기본시간,0) */
  var ot = r.otApply ? r10((Number(r.otHours) || 0) * common * 1.5) : 0;
  var nt = r.ntApply ? r10((Number(r.ntHours) || 0) * common * 0.5) : 0;
  var annual = r10(s.stdHours * common * (Number(r.annualDays) || 0) / 12);
  var directBase = basic + pos + qual + ot + nt + annual;     /* 기본급여~연차수당 합 */
  var retire = r10(directBase / 12);                          /* 퇴직충당금 */
  var directSum = directBase + retire;                        /* 직접인건비 소계 */
  var monthlyPay = directSum - retire - annual;              /* 월급여(실지급) = 소계−퇴직충당금−연차수당 */
  /* 간접인건비 — 기준은 directBase (퇴직충당금 제외) */
  var pension = r0(directBase * s.rPension / 100);
  var accident = r0(directBase * s.rAccident / 100);
  var health = r0(directBase * s.rHealth / 100);
  var employ = r0(directBase * s.rEmploy / 100);
  var care = r0(directBase * s.rCare / 100);
  var bizTax = r0(health * s.rBizTax / 100);
  var indirectSum = pension + accident + health + employ + care + bizTax;
  return {baseHours:baseHours, common:common, ot:ot, nt:nt, annual:annual, directBase:directBase,
    retire:retire, directSum:directSum, monthlyPay:monthlyPay, pension:pension, accident:accident,
    health:health, employ:employ, care:care, bizTax:bizTax, indirectSum:indirectSum,
    belowMin: (Number(r.hourly) || 0) < s.minWage};
}

/* 전체 견적 집계 */
function qCalcAll(rows, gen, oth, s) {
  var totalHead = rows.reduce(function(a, r) { return a + (Number(r.count) || 0); }, 0);
  var nightHead = rows.reduce(function(a, r) { return a + (r.ntApply ? (Number(r.count) || 0) : 0); }, 0);
  var genTotal = gen.reduce(function(a, g) { return a + (g.nightBased ? (Number(g.unit) || 0) * nightHead : (Number(g.unit) || 0) * (Number(g.qty) || 0)); }, 0);
  var othTotal = oth.reduce(function(a, o) { return a + (Number(o.unit) || 0) * (Number(o.qty) || 0); }, 0);
  var etcTotal = genTotal + othTotal;                          /* 기타비용 총계 */
  var allocPerHead = totalHead > 0 ? etcTotal / totalHead : 0; /* 1인당 기타비용 배분 */
  var calc = rows.map(function(r) {
    var c = qCalcRow(r, s);
    c.etc = allocPerHead;
    c.junggye = c.directSum + c.indirectSum + c.etc;           /* 중계 = 직접+간접+기타 */
    c.admin = r0(c.junggye * s.adminRate / 100);               /* 일반관리비 */
    c.profit = r0((c.junggye + c.admin) * s.profitRate / 100); /* 기업이윤 */
    c.exVat = c.junggye + c.admin + c.profit;                  /* 월간합계 부가세별도 (1인) */
    c.inVat = r0(c.exVat * (1 + s.vat / 100));                 /* 월간합계 부가세포함 (1인) */
    var cnt = Number(r.count) || 0;
    c.count = cnt;
    c.rowExVat = c.exVat * cnt;
    c.rowInVat = c.inVat * cnt;
    c.rowIndirect = c.indirectSum * cnt;                       /* 행 간접인건비 (조정불가) */
    return c;
  });
  var totalExVat = calc.reduce(function(a, c) { return a + c.rowExVat; }, 0);
  var totalIndirect = calc.reduce(function(a, c) { return a + c.rowIndirect; }, 0);
  var totalInVat = r0(totalExVat * (1 + s.vat / 100));
  return {calc:calc, totalHead:totalHead, nightHead:nightHead, genTotal:genTotal, othTotal:othTotal,
    etcTotal:etcTotal, allocPerHead:allocPerHead, totalExVat:totalExVat, totalInVat:totalInVat,
    totalIndirect:totalIndirect};
}

/* 엑셀(견적서 양식) 다운로드 — 외부 라이브러리 없이 .xls(HTML) 생성 */
function qExportExcel(rows, gen, oth, s, agg, prices) {
  var th = "border:1px solid #999;padding:5px 8px;background:#f2f2f2;font-weight:bold;text-align:center;";
  var td = "border:1px solid #999;padding:5px 8px;text-align:right;";

  h += "<table style='border-collapse:collapse;font-family:맑은 고딕,Malgun Gothic;font-size:12px;'>";
  h += "<tr><td colspan='13' style='font-size:20px;font-weight:bold;text-align:center;padding:14px;'>견  적  서</td></tr>";
  h += "<tr><td colspan='13' style='text-align:right;padding:4px 8px;'>작성일: " + (new Date().toISOString().slice(0,10)) + "</td></tr>";
  h += "<tr><td colspan='13' style='padding:4px 8px;'>건명: 대웅 그룹사 건물종합관리용역</td></tr>";
  h += "<tr>" + ["직군/구분","인원","월급여","직접인건비","간접인건비","기타비용","중계","일반관리비","기업이윤","1인 단가(부가세별도)","행 합계(부가세별도)","부가세포함"].map(function(x, i) { return "<th style='" + th + "'>" + x + "</th>"; }).join("") + "</tr>";
  rows.forEach(function(r, i) {
    var c = agg.calc[i];
    var unit = prices && prices[r.id] != null ? prices[r.id] : c.exVat;     /* 확정 단가 우선 */
    var rowSum = unit * c.count;
    h += "<tr>";
    h += "<td style='" + tdL + "'>" + r.label + "</td>";
    h += "<td style='" + td + "'>" + c.count + "</td>";
    h += "<td style='" + td + "'>" + nf(c.monthlyPay) + "</td>";
    h += "<td style='" + td + "'>" + nf(c.directSum) + "</td>";
    h += "<td style='" + td + "'>" + nf(c.indirectSum) + "</td>";
    h += "<td style='" + td + "'>" + nf(c.etc) + "</td>";
    h += "<td style='" + td + "'>" + nf(c.junggye) + "</td>";
    h += "<td style='" + td + "'>" + nf(c.admin) + "</td>";
    h += "<td style='" + td + "'>" + nf(c.profit) + "</td>";
    h += "<td style='" + td + "'>" + nf(unit) + "</td>";
    h += "<td style='" + td + "'>" + nf(rowSum) + "</td>";
    h += "<td style='" + td + "'>" + nf(r0(rowSum * (1 + s.vat / 100))) + "</td>";
    h += "</tr>";
  });
  var gExVat = prices ? rows.reduce(function(a, r, i) { var u = prices[r.id] != null ? prices[r.id] : agg.calc[i].exVat; return a + u * agg.calc[i].count; }, 0) : agg.totalExVat;
  h += "<tr><td colspan='10' style='" + th + "text-align:right;'>합계 (부가세 별도)</td><td colspan='2' style='" + td + "font-weight:bold;'>" + nf(gExVat) + "</td></tr>";
  h += "<tr><td colspan='10' style='" + th + "text-align:right;'>합계 (부가세 포함)</td><td colspan='2' style='" + td + "font-weight:bold;'>" + nf(r0(gExVat * (1 + s.vat / 100))) + "</td></tr>";
  h += "</table>";
  /* 기타비용 내역 */
  h += "<br/><table style='border-collapse:collapse;font-family:맑은 고딕;font-size:12px;'>";
  h += "<tr><td colspan='4' style='font-weight:bold;padding:6px;'>[ 기타비용 내역 ]</td></tr>";
  h += "<tr><th style='" + th + "'>항목</th><th style='" + th + "'>단가</th><th style='" + th + "'>수량</th><th style='" + th + "'>소계</th></tr>";
  gen.forEach(function(g) { var q = g.nightBased ? agg.nightHead : (Number(g.qty) || 0); h += "<tr><td style='" + tdL + "'>" + g.nm + (g.nightBased ? " (야간인원)" : "") + "</td><td style='" + td + "'>" + nf(g.unit) + "</td><td style='" + td + "'>" + q + "</td><td style='" + td + "'>" + nf((Number(g.unit) || 0) * q) + "</td></tr>"; });
  oth.forEach(function(o) { h += "<tr><td style='" + tdL + "'>" + o.nm + "</td><td style='" + td + "'>" + nf(o.unit) + "</td><td style='" + td + "'>" + (Number(o.qty) || 0) + "</td><td style='" + td + "'>" + nf((Number(o.unit) || 0) * (Number(o.qty) || 0)) + "</td></tr>"; });
  h += "</table>";
  var html = "<html><head><meta charset='UTF-8'></head><body>" + h + "</body></html>";
  var blob = new Blob(["﻿", html], {type:"application/vnd.ms-excel;charset=utf-8"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "견적서_대웅그룹사_" + (new Date().toISOString().slice(0,10)) + ".xls";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

/* 작은 입력 셀 */
function QCell(p) {
  return <input type={p.type || "number"} value={p.value} onChange={function(e) { p.onChange(p.type === "text" ? e.target.value : (e.target.value === "" ? "" : Number(e.target.value))); }}
    style={{width:p.w || 90,padding:"6px 8px",borderRadius:6,border:"1px solid " + (p.warn ? "#ef4444" : "#e2e8f0"),fontSize:12,textAlign:p.type === "text" ? "left" : "right",outline:"none",background:p.warn ? "#fef2f2" : "#fff"}} />;
}

function QuotationPage() {
  var _s = useState(Q_DEF_SET), set = _s[0], setSet = _s[1];
  var _r = useState(Q_SEED_ROWS), rows = _r[0], setRows = _r[1];
  var _g = useState(Q_SEED_GEN), gen = _g[0], setGen = _g[1];
  var _o = useState(Q_SEED_OTH), oth = _o[0], setOth = _o[1];
  var _sg = useState(false), showSet = _sg[0], setShowSet = _sg[1];
  var _tg = useState(null), target = _tg[0], setTarget = _tg[1];   /* 시뮬레이션 목표금액 */
  var _cf = useState(null), confirmed = _cf[0], setConfirmed = _cf[1]; /* 확정 단가 map */
  var _ts = useState(null), toast = _ts[0], setToast = _ts[1];
  function doToast(m) { setToast(m); setTimeout(function() { setToast(null); }, 2500); }

  var agg = useMemo(function() { return qCalcAll(rows, gen, oth, set); }, [rows, gen, oth, set]);
  var baseTotal = agg.totalExVat;
  var simTarget = target == null ? baseTotal : target;
  var simMin = Math.round(baseTotal * 0.5), simMax = Math.round(baseTotal * 1.5);

  /* 시뮬레이션: 간접인건비 고정, 나머지를 비율 조정해 목표금액 충족 */
  var sim = useMemo(function() {
    var fixed = agg.totalIndirect;
    var adjustable = baseTotal - fixed;
    var factor = adjustable > 0 ? (simTarget - fixed) / adjustable : 1;
    if (factor < 0) factor = 0;
    var perRow = agg.calc.map(function(c, i) {
      var newUnit = c.indirectSum + (c.exVat - c.indirectSum) * factor;
      return {id:rows[i].id, label:rows[i].label, count:c.count, oldUnit:c.exVat, newUnit:Math.round(newUnit), oldRow:c.rowExVat, newRow:Math.round(newUnit) * c.count, indirect:c.indirectSum};
    });
    var newTotal = perRow.reduce(function(a, p) { return a + p.newRow; }, 0);
    return {factor:factor, perRow:perRow, newTotal:newTotal, fixed:fixed};
  }, [agg, simTarget, baseTotal, rows]);

  /* 행 조작 */
  function updRow(id, k, v) { setRows(function(p) { return p.map(function(r) { return r.id === id ? Object.assign({}, r, makeUpd(k, v)) : r; }); }); }
  function makeUpd(k, v) { var o = {}; o[k] = v; return o; }
  function addRow() { setRows(function(p) { return p.concat([{id:"q" + Date.now(),label:"신규 직군",area:"시설",count:1,workType:"week",hourly:set.minWage,basic:2096270,posPay:0,qualPay:0,otHours:0,otApply:false,ntHours:0,ntApply:false,annualDays:10}]); }); }
  function delRow(id) { setRows(function(p) { return p.filter(function(r) { return r.id !== id; }); }); }

  function updGen(id, k, v) { setGen(function(p) { return p.map(function(g) { return g.id === id ? Object.assign({}, g, makeUpd(k, v)) : g; }); }); }
  function addGen() { setGen(function(p) { return p.concat([{id:"g" + Date.now(),nm:"신규 제경비",unit:0,qty:1,nightBased:false}]); }); }
  function delGen(id) { setGen(function(p) { return p.filter(function(g) { return g.id !== id; }); }); }
  function updOth(id, k, v) { setOth(function(p) { return p.map(function(o) { return o.id === id ? Object.assign({}, o, makeUpd(k, v)) : o; }); }); }
  function addOth() { setOth(function(p) { return p.concat([{id:"o" + Date.now(),nm:"신규 기타경비",unit:0,qty:1}]); }); }
  function delOth(id) { setOth(function(p) { return p.filter(function(o) { return o.id !== id; }); }); }
  function updSet(k, v) { setSet(function(p) { return Object.assign({}, p, makeUpd(k, v)); }); }

  var sumCard = {background:"#fff",borderRadius:14,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",padding:"16px 18px"};
  var miniLbl = {fontSize:11,color:"#64748b",marginBottom:4};
  var miniVal = {fontSize:20,fontWeight:800,color:"#0f172a"};

  function confirmSim() {
    var m = {};
    sim.perRow.forEach(function(p) { m[p.id] = p.newUnit; });
    setConfirmed(m); doToast("조정 단가가 확정되었습니다. 엑셀 다운로드에 반영됩니다.");
  }
  function resetSim() { setTarget(null); setConfirmed(null); doToast("기준 단가로 초기화"); }

  return (
    <div>
      {/* 상단 요약 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:18}}>
        <div style={Object.assign({}, sumCard, {borderLeft:"4px solid #6366f1"})}><div style={miniLbl}>총 인원</div><div style={miniVal}>{agg.totalHead}<span style={{fontSize:13,fontWeight:400,color:"#94a3b8"}}> 명</span></div></div>
        <div style={Object.assign({}, sumCard, {borderLeft:"4px solid #0ea5e9"})}><div style={miniLbl}>간접인건비 (조정불가)</div><div style={miniVal}>{won(agg.totalIndirect)}</div></div>
        <div style={Object.assign({}, sumCard, {borderLeft:"4px solid #f59e0b"})}><div style={miniLbl}>기타비용 총계</div><div style={miniVal}>{won(agg.etcTotal)}</div></div>
        <div style={Object.assign({}, sumCard, {borderLeft:"4px solid #10b981"})}><div style={miniLbl}>총 견적 (부가세 별도)</div><div style={miniVal}>{won(agg.totalExVat)}</div></div>
        <div style={Object.assign({}, sumCard, {borderLeft:"4px solid #8b5cf6"})}><div style={miniLbl}>총 견적 (부가세 포함)</div><div style={miniVal}>{won(agg.totalInVat)}</div></div>
      </div>

      {/* 인원 / 근무·직접인건비 입력 */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:700}}>👥 인원 · 근무시간 · 직접인건비</div>
          <div style={{display:"flex",gap:8}}>
            <button style={bSm} onClick={function() { setShowSet(!showSet); }}>⚙️ 요율·근무 설정</button>
            <button style={bPri} onClick={addRow}>+ 인원 추가</button>
          </div>
        </div>

        {showSet && <div style={{background:"#f8fafc",borderRadius:10,padding:16,marginBottom:16,border:"1px solid #e2e8f0"}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>설정 (법령·정책 변경 시 수정)</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12}}>
            {[["weekHours","주간직 기본시간"],["shiftHours","교대직 기본시간"],["stdHours","소정근로시간"],["minWage","법정최저시급(원)"],["rPension","국민연금 %"],["rAccident","산재보험 %"],["rHealth","건강보험 %"],["rEmploy","고용보험 %"],["rCare","장기요양 %"],["rBizTax","사업소세 %"],["adminRate","일반관리비 %"],["profitRate","기업이윤 %"],["vat","부가세 %"]].map(function(f) {
              return <div key={f[0]}><label style={lblS}>{f[1]}</label><QCell value={set[f[0]]} w={"100%"} onChange={function(v) { updSet(f[0], v); }} /></div>;
            })}
          </div>
        </div>}

        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"separate",borderSpacing:0,fontSize:12,whiteSpace:"nowrap"}}>
            <thead><tr>{["직군/구분","인원","근무형태","시간급","기본급여","직책수당","자격수당","연장","야간","연차일","통상시급","월급여(실지급)",""].map(function(h, i) { return <th key={i} style={Object.assign({}, thS, {textAlign:"center"})}>{h}</th>; })}</tr></thead>
            <tbody>{rows.map(function(r) {
              var c = qCalcRow(r, set);
              return <tr key={r.id}>
                <td style={tdS}><QCell type="text" w={120} value={r.label} onChange={function(v) { updRow(r.id, "label", v); }} /></td>
                <td style={tdS}><QCell w={54} value={r.count} onChange={function(v) { updRow(r.id, "count", v); }} /></td>
                <td style={tdS}><select value={r.workType} onChange={function(e) { updRow(r.id, "workType", e.target.value); }} style={{padding:"6px 6px",borderRadius:6,border:"1px solid #e2e8f0",fontSize:12}}><option value="week">주간직({set.weekHours})</option><option value="shift">교대직({set.shiftHours})</option></select></td>
                <td style={tdS}><QCell w={80} value={r.hourly} warn={c.belowMin} onChange={function(v) { updRow(r.id, "hourly", v); }} />{c.belowMin && <div style={{fontSize:9.5,color:"#ef4444",marginTop:2}}>최저시급 미만!</div>}</td>
                <td style={tdS}><QCell w={92} value={r.basic} onChange={function(v) { updRow(r.id, "basic", v); }} /></td>
                <td style={tdS}><QCell w={80} value={r.posPay} onChange={function(v) { updRow(r.id, "posPay", v); }} /></td>
                <td style={tdS}><QCell w={80} value={r.qualPay} onChange={function(v) { updRow(r.id, "qualPay", v); }} /></td>
                <td style={tdS}><div style={{display:"flex",alignItems:"center",gap:4}}><input type="checkbox" checked={r.otApply} onChange={function(e) { updRow(r.id, "otApply", e.target.checked); }} title="연장근로 적용" /><QCell w={48} value={r.otHours} onChange={function(v) { updRow(r.id, "otHours", v); }} /><span style={{fontSize:9.5,color:"#94a3b8"}}>h</span></div></td>
                <td style={tdS}><div style={{display:"flex",alignItems:"center",gap:4}}><input type="checkbox" checked={r.ntApply} onChange={function(e) { updRow(r.id, "ntApply", e.target.checked); }} title="야간근로 적용" /><QCell w={48} value={r.ntHours} onChange={function(v) { updRow(r.id, "ntHours", v); }} /><span style={{fontSize:9.5,color:"#94a3b8"}}>h</span></div></td>
                <td style={tdS}><QCell w={44} value={r.annualDays} onChange={function(v) { updRow(r.id, "annualDays", v); }} /></td>
                <td style={Object.assign({}, tdS, {textAlign:"right",color:"#475569"})}>{nf(c.common)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right",fontWeight:700,color:"#6366f1"})}>{nf(c.monthlyPay)}</td>
                <td style={tdS}><button onClick={function() { delRow(r.id); }} style={{background:"#fef2f2",border:"1px solid #fecaca",color:"#ef4444",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:12}}>✕</button></td>
              </tr>;
            })}</tbody>
          </table>
        </div>
      </div>

      {/* 인원별 비용 산출 (직접·간접·기타·이윤) */}
      <div style={card}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>💰 인원별 비용 산출</div>
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"separate",borderSpacing:0,fontSize:12,whiteSpace:"nowrap"}}>
            <thead><tr>{["직군","연장수당","야간수당","연차수당","퇴직충당금","직접인건비계","간접인건비계","기타비용(1인)","중계","일반관리비","기업이윤","부가세별도(1인)","부가세포함(1인)","행 합계(별도)"].map(function(h, i) { return <th key={i} style={Object.assign({}, thS, {textAlign:i === 0 ? "left" : "right"})}>{h}</th>; })}</tr></thead>
            <tbody>{rows.map(function(r, i) {
              var c = agg.calc[i];
              return <tr key={r.id}>
                <td style={Object.assign({}, tdS, {fontWeight:600})}>{r.label} <span style={{color:"#94a3b8",fontWeight:400}}>×{c.count}</span></td>
                <td style={Object.assign({}, tdS, {textAlign:"right"})}>{nf(c.ot)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right"})}>{nf(c.nt)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right"})}>{nf(c.annual)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right"})}>{nf(c.retire)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right",fontWeight:600})}>{nf(c.directSum)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right",color:"#0ea5e9",fontWeight:600})}>{nf(c.indirectSum)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right"})}>{nf(c.etc)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right",fontWeight:600})}>{nf(c.junggye)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right"})}>{nf(c.admin)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right"})}>{nf(c.profit)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right",fontWeight:700})}>{nf(c.exVat)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right",color:"#8b5cf6"})}>{nf(c.inVat)}</td>
                <td style={Object.assign({}, tdS, {textAlign:"right",fontWeight:700,color:"#10b981"})}>{nf(c.rowExVat)}</td>
              </tr>;
            })}</tbody>
            <tfoot><tr style={{background:"#f8fafc"}}>
              <td style={Object.assign({}, tdS, {fontWeight:700})}>합계</td>
              <td colSpan="5" style={tdS}></td>
              <td style={Object.assign({}, tdS, {textAlign:"right",fontWeight:700,color:"#0ea5e9"})}>{nf(agg.totalIndirect)}</td>
              <td colSpan="5" style={tdS}></td>
              <td style={Object.assign({}, tdS, {textAlign:"right",fontWeight:800,color:"#10b981"})}>{nf(agg.totalExVat)}</td>
            </tr></tfoot>
          </table>
        </div>
      </div>

      {/* 기타비용 (제경비 / 기타경비) */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style={card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:700}}>📦 제경비</div><button style={bSm} onClick={addGen}>+ 행 추가</button>
          </div>
          <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:12}}>
            <thead><tr>{["항목","단가","수량","야간","소계",""].map(function(h, i) { return <th key={i} style={Object.assign({}, thS, {textAlign:i === 0 ? "left" : "center"})}>{h}</th>; })}</tr></thead>
            <tbody>{gen.map(function(g) {
              var q = g.nightBased ? agg.nightHead : (Number(g.qty) || 0);
              return <tr key={g.id}>
                <td style={tdS}><QCell type="text" w={110} value={g.nm} onChange={function(v) { updGen(g.id, "nm", v); }} /></td>
                <td style={tdS}><QCell w={80} value={g.unit} onChange={function(v) { updGen(g.id, "unit", v); }} /></td>
                <td style={tdS}>{g.nightBased ? <span style={{color:"#94a3b8"}}>{agg.nightHead}</span> : <QCell w={48} value={g.qty} onChange={function(v) { updGen(g.id, "qty", v); }} />}</td>
                <td style={Object.assign({}, tdS, {textAlign:"center"})}><input type="checkbox" checked={g.nightBased} onChange={function(e) { updGen(g.id, "nightBased", e.target.checked); }} title="야간인원 × 단가" /></td>
                <td style={Object.assign({}, tdS, {textAlign:"right",fontWeight:600})}>{nf((Number(g.unit) || 0) * q)}</td>
                <td style={tdS}><button onClick={function() { delGen(g.id); }} style={{background:"#fef2f2",border:"1px solid #fecaca",color:"#ef4444",borderRadius:6,padding:"3px 7px",cursor:"pointer"}}>✕</button></td>
              </tr>;
            })}</tbody>
            <tfoot><tr style={{background:"#f8fafc"}}><td colSpan="4" style={Object.assign({}, tdS, {fontWeight:700})}>제경비 소계</td><td colSpan="2" style={Object.assign({}, tdS, {textAlign:"right",fontWeight:700})}>{nf(agg.genTotal)}</td></tr></tfoot>
          </table>
        </div>
        <div style={card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:700}}>🧾 기타경비</div><button style={bSm} onClick={addOth}>+ 행 추가</button>
          </div>
          <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:12}}>
            <thead><tr>{["항목","단가","수량","소계",""].map(function(h, i) { return <th key={i} style={Object.assign({}, thS, {textAlign:i === 0 ? "left" : "center"})}>{h}</th>; })}</tr></thead>
            <tbody>{oth.map(function(o) {
              return <tr key={o.id}>
                <td style={tdS}><QCell type="text" w={120} value={o.nm} onChange={function(v) { updOth(o.id, "nm", v); }} /></td>
                <td style={tdS}><QCell w={90} value={o.unit} onChange={function(v) { updOth(o.id, "unit", v); }} /></td>
                <td style={tdS}><QCell w={54} value={o.qty} onChange={function(v) { updOth(o.id, "qty", v); }} /></td>
                <td style={Object.assign({}, tdS, {textAlign:"right",fontWeight:600})}>{nf((Number(o.unit) || 0) * (Number(o.qty) || 0))}</td>
                <td style={tdS}><button onClick={function() { delOth(o.id); }} style={{background:"#fef2f2",border:"1px solid #fecaca",color:"#ef4444",borderRadius:6,padding:"3px 7px",cursor:"pointer"}}>✕</button></td>
              </tr>;
            })}</tbody>
            <tfoot><tr style={{background:"#f8fafc"}}><td colSpan="3" style={Object.assign({}, tdS, {fontWeight:700})}>기타경비 소계</td><td colSpan="2" style={Object.assign({}, tdS, {textAlign:"right",fontWeight:700})}>{nf(agg.othTotal)}</td></tr></tfoot>
          </table>
        </div>
      </div>

      {/* 시뮬레이션 */}
      <div style={Object.assign({}, card, {borderTop:"3px solid #6366f1"})}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{fontSize:15,fontWeight:700}}>🎚️ 견적 시뮬레이션 (±50%)</div>
          <div style={{fontSize:12,color:"#64748b"}}>간접인건비 {won(agg.totalIndirect)} 는 조정 불가</div>
        </div>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:14}}>총 견적금액을 ±50% 범위에서 조정하면 각 인원별 단가가 자동 제안됩니다. 담당자 판단 후 확정하세요.</div>
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:8}}>
          <input type="range" min={simMin} max={simMax} step={Math.max(1, Math.round((simMax - simMin) / 200))} value={Math.min(simMax, Math.max(simMin, simTarget))} onChange={function(e) { setTarget(Number(e.target.value)); }} style={{flex:1,accentColor:"#6366f1"}} />
          <div style={{textAlign:"right",minWidth:230}}>
            <div style={{fontSize:11,color:"#64748b"}}>목표 견적금액 (부가세 별도)</div>
            <div style={{fontSize:22,fontWeight:800,color:"#6366f1"}}>{won(simTarget)}</div>
            <div style={{fontSize:11,color: simTarget >= baseTotal ? "#10b981" : "#ef4444",fontWeight:600}}>{simTarget >= baseTotal ? "+" : ""}{baseTotal > 0 ? ((simTarget / baseTotal - 1) * 100).toFixed(1) : 0}% vs 기준 {won(baseTotal)}</div>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10.5,color:"#94a3b8",marginBottom:16}}><span>-50% ({won(simMin)})</span><span>기준</span><span>+50% ({won(simMax)})</span></div>

        <div style={{background:"#f8fafc",borderRadius:10,padding:14,marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>📝 인원별 조정 단가 제안</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {sim.perRow.map(function(p) {
              var diff = p.newUnit - p.oldUnit;
              return <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,fontSize:12.5,padding:"8px 12px",background:"#fff",borderRadius:8,border:"1px solid #f1f5f9"}}>
                <span style={{fontWeight:600,minWidth:140}}>{p.label} <span style={{color:"#94a3b8"}}>({p.count}명)</span></span>
                <span style={{color:"#64748b"}}>1인당 {won(p.oldUnit)}</span>
                <span style={{color:"#94a3b8"}}>→</span>
                <span style={{fontWeight:700,color:"#6366f1"}}>{won(p.newUnit)}</span>
                <span style={{fontSize:11,color: diff >= 0 ? "#10b981" : "#ef4444"}}>({diff >= 0 ? "+" : ""}{nf(diff)})</span>
                <span style={{marginLeft:"auto",color:"#475569"}}>행 합계 {won(p.newRow)}</span>
              </div>;
            })}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12,paddingTop:12,borderTop:"1px solid #e2e8f0"}}>
            <span style={{fontSize:13,fontWeight:700}}>조정 후 합계 (부가세 별도)</span>
            <span style={{fontSize:18,fontWeight:800,color:"#6366f1"}}>{won(sim.newTotal)}</span>
          </div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button style={bDef} onClick={resetSim}>기준값으로 초기화</button>
          <button style={bPri} onClick={confirmSim}>✓ 이 단가로 확정</button>
        </div>
      </div>

      {/* 다운로드 */}
      <div style={Object.assign({}, card, {display:"flex",justifyContent:"space-between",alignItems:"center"})}>
        <div>
          <div style={{fontSize:14,fontWeight:700}}>📥 견적서 엑셀 다운로드</div>
          <div style={{fontSize:12,color:"#94a3b8",marginTop:3}}>{confirmed ? "✓ 확정된 조정 단가로 출력됩니다." : "현재 산출된 기준 단가로 출력됩니다. (시뮬레이션 확정 시 조정 단가 반영)"}</div>
        </div>
        <button style={Object.assign({}, bSuc, {padding:"11px 22px",fontSize:14})} onClick={function() { qExportExcel(rows, gen, oth, set, agg, confirmed); doToast("견적서 엑셀이 생성되었습니다."); }}>⬇ 엑셀(.xls) 다운로드</button>
      </div>

      {toast && <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#0f172a",color:"#fff",padding:"12px 28px",borderRadius:12,fontSize:13,fontWeight:600,boxShadow:"0 8px 32px rgba(0,0,0,0.25)",zIndex:2000}}>✅ {toast}</div>}
    </div>
  );
}

document.getElementById("loading").style.display="none";
ReactDOM.createRoot(document.getElementById("root")).render(<QuotationPage/>);
} catch(err) {
  document.getElementById("loading").style.display="none";
  var eb=document.getElementById("error-box");
  eb.style.display="block";
  eb.innerHTML="<h2>앱 실행 오류</h2><pre>"+err.message+"\n"+err.stack+"</pre>";
}
</script>
</body>
</html>
