/* 새 인원(직군) 행 — 인원 추가 시 제경비·기타경비 1줄씩 자동 생성 */
function newRow(s){
  return {id:uid("q"),label:"",area:"시설",count:1,workType:"week",baseHours:s.weekHours,stdHours:s.stdHours,
    basic:"",posPay:"",qualPay:"",otHours:"",otApply:false,ntHours:"",ntApply:false,annualDays:10,
    genItems:[{id:uid("gi"),nm:"",unit:"",qty:1}], othItems:[{id:uid("oi"),nm:"",unit:"",qty:1}]};
}

/* 직군 카탈로그에서 종류명으로 단가 조회 */
function qUnit(list,nm){ var it=(list||[]).filter(function(x){return x.nm===nm;})[0]; return it?(Number(it.unit)||0):0; }
/* 한 인원(직군) 행의 모든 파생값 — 모든 금액은 1인 기준 */
function qCalcRow(r,s,catalog){
  var baseHours = Number(r.baseHours)||(r.workType==="shift"?s.shiftHours:s.weekHours);
  var stdHours = Number(r.stdHours)||s.stdHours;
  var basic=Number(r.basic)||0, pos=Number(r.posPay)||0, qual=Number(r.qualPay)||0;
  var common = r0((basic+pos)/baseHours);                       /* 통상시급 = ROUND((기본급여+직책수당)/기본시간,0) */
  var hourly = r0(basic/baseHours);                             /* 시간급 = ROUND(기본급여/기본근로시간) */
  var ot = r.otApply ? r10(common*stdHours*(Number(r.otHours)||0)/12) : 0;  /* 연장 = ROUND((통상시급×소정근로시간)×연장시간/12, -1) */
  var nt = r.ntApply ? r10((Number(r.ntHours)||0)*common*0.5) : 0;
  var annual = r10(stdHours*common*(Number(r.annualDays)||0)/12);
  var directBase = basic+pos+qual+ot+nt+annual;
  var retire = r10(directBase/12);
  var directSum = directBase+retire;
  var monthlyPay = directSum-retire-annual;
  var pension=r10(directBase*s.rPension/100), accident=r10(directBase*s.rAccident/100),
      health=r10(directBase*s.rHealth/100), employ=r10(directBase*s.rEmploy/100),
      care=r10(health*s.rCare/100), bizTax=r10(directBase*s.rBizTax/100);  /* 장기요양=ROUND(건강보험×장기요양요율,-1) · 사업소세=ROUND((기본급여~연차수당)×사업소세요율,-1) */
  var indirectSum = pension+accident+health+employ+care+bizTax;
  /* 기타비용 — 직군 카탈로그 단가 × 수량 (1인당), 카탈로그 변경 시 자동 반영 */
  var ar=(catalog&&(catalog[r.area]||catalog[Object.keys(catalog)[0]]))||{gen:[],oth:[]};
  var etcGenPer=(r.genItems||[]).reduce(function(a,g){return a+qUnit(ar.gen,g.nm)*(Number(g.qty)||0);},0);
  var etcOthPer=(r.othItems||[]).reduce(function(a,o){return a+qUnit(ar.oth,o.nm)*(Number(o.qty)||0);},0);
  return {baseHours:baseHours,stdHours:stdHours,common:common,hourly:hourly,ot:ot,nt:nt,annual:annual,
    directBase:directBase,retire:retire,directSum:directSum,monthlyPay:monthlyPay,pension:pension,accident:accident,
    health:health,employ:employ,care:care,bizTax:bizTax,indirectSum:indirectSum,
    etcGenPer:etcGenPer,etcOthPer:etcOthPer,etc:etcGenPer+etcOthPer,belowMin:hourly<s.minWage};
}

function qCalcAll(rows,s,catalog){
  var totalHead=rows.reduce(function(a,r){return a+(Number(r.count)||0);},0);
  var calc=rows.map(function(r){
    var c=qCalcRow(r,s,catalog);
    var cnt=Number(r.count)||0; c.count=cnt;
    c.rowEtc=c.etc*cnt;
    c.junggye=c.directSum+c.indirectSum+c.etc;                  /* 중계 = 직접+간접+기타 */
    c.admin=r0(c.junggye*s.adminRate/100);                      /* 일반관리비 */
    c.profit=r0((c.junggye+c.admin)*s.profitRate/100);          /* 기업이윤 */
    c.exVat=r1000(c.junggye+c.admin+c.profit);                  /* 부가세별도 (1인) = ROUND(중계+관리비+이윤, -3) */
    c.inVat=r0(c.exVat*(1+s.vat/100));                          /* 부가세포함 (1인) */
    c.rowExVat=c.exVat*cnt; c.rowInVat=c.inVat*cnt; c.rowIndirect=c.indirectSum*cnt;
    return c;
  });
  var etcTotal=calc.reduce(function(a,c){return a+c.rowEtc;},0);
  var totalExVat=calc.reduce(function(a,c){return a+c.rowExVat;},0);
  var totalIndirect=calc.reduce(function(a,c){return a+c.rowIndirect;},0);
  var totalInVat=r0(totalExVat*(1+s.vat/100));
  return {calc:calc,totalHead:totalHead,etcTotal:etcTotal,totalExVat:totalExVat,totalInVat:totalInVat,totalIndirect:totalIndirect};
}

/* 엑셀(견적서 양식) 다운로드 — 외부 라이브러리 없이 .xls(HTML) 생성 */
function qExportExcel(rows,s,agg,catalog,title){
  function esc(t){ return String(t==null?"":t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;"); }
  var groups=[]; Object.keys(catalog).forEach(function(a){ var idx=[]; rows.forEach(function(r,i){ if(r.area===a) idx.push(i); }); if(idx.length) groups.push({nm:a,idx:idx}); });
  var seen={}; groups.forEach(function(g){ g.idx.forEach(function(i){ seen[i]=1; }); });
  var rest=[]; rows.forEach(function(r,i){ if(!seen[i]) rest.push(i); }); if(rest.length) groups.push({nm:"기타",idx:rest});
  var colMap=[{t:"gubun"}];
  groups.forEach(function(g){ g.idx.forEach(function(i){ colMap.push({t:"job",i:i}); }); colMap.push({t:"sub",n:g.idx.length}); });
  colMap.push({t:"total"}); colMap.push({t:"basis"});
  colMap.forEach(function(c,k){ c.col=k+1; });
  var totalCol, subCols=[]; colMap.forEach(function(c){ if(c.t==="total")totalCol=c.col; if(c.t==="sub")subCols.push(c.col); });
  var ncols=colMap.length, PR=3;
  var rP=(Number(s.rPension)||0)/100,rA=(Number(s.rAccident)||0)/100,rH=(Number(s.rHealth)||0)/100,rE=(Number(s.rEmploy)||0)/100,rC=(Number(s.rCare)||0)/100,rB=(Number(s.rBizTax)||0)/100;
  var adm=(Number(s.adminRate)||0)/100,prf=(Number(s.profitRate)||0)/100,vm=1+(Number(s.vat)||0)/100,vat=Number(s.vat)||0;
  /* 행 정의: kind(count/unit/money), val(표시·집계값), f(R1C1 수식) */
  var ROWS=[
    {lbl:"인 원",kind:"count",val:function(c){return c.count;}},
    {lbl:"월 급 여",kind:"money",val:function(c){return c.monthlyPay;},f:function(){return "=R[13]C-R[12]C-R[11]C";}},
    {lbl:"월근무시간",kind:"unit",val:function(c){return c.baseHours;}},
    {lbl:"소정근로시간",kind:"unit",val:function(c){return c.stdHours;}},
    {lbl:"연장시간",kind:"unit",val:function(c,r){return r.otApply?(Number(r.otHours)||0):0;}},
    {lbl:"야간시간",kind:"unit",val:function(c,r){return r.ntApply?(Number(r.ntHours)||0):0;}},
    {lbl:"시 간 급",kind:"unit",val:function(c){return c.hourly;},f:function(){return "=ROUND(R[2]C/R[-4]C,0)";},basis:"기본급여/월근무시간"},
    {lbl:"통상임금(시급)",kind:"unit",val:function(c){return c.common;},f:function(){return "=ROUND((R[1]C+R[2]C)/R[-5]C,0)";},basis:"(기본급여+직책수당)/월근무시간"},
    {lbl:"기본급여",kind:"money",val:function(c,r){return Number(r.basic)||0;}},
    {lbl:"직책/자격수당",kind:"money",val:function(c,r){return (Number(r.posPay)||0)+(Number(r.qualPay)||0);}},
    {lbl:"연장근로수당",kind:"money",val:function(c){return c.ot;},f:function(){return "=ROUND((R[-3]C*R[-7]C)*R[-6]C/12,-1)";},basis:"ROUND((통상시급*소정근로시간)*연장시간/12,-1)"},
    {lbl:"야간근로수당",kind:"money",val:function(c){return c.nt;},f:function(){return "=ROUND(R[-6]C*R[-4]C*0.5,-1)";},basis:"ROUND(야간시간*통상시급*0.5,-1)"},
    {lbl:"연차수당",kind:"money",val:function(c){return c.annual;},f:function(r){return "=ROUND(R[-9]C*R[-5]C*"+(Number(r.annualDays)||0)+"/12,-1)";},basis:"ROUND(소정*통상시급*연차일/12,-1)"},
    {lbl:"퇴직충당금",kind:"money",val:function(c){return c.retire;},f:function(){return "=ROUND(SUM(R[-5]C:R[-1]C)/12,-1)";},basis:"ROUND(SUM(기본급여:연차수당)/12,-1)"},
    {lbl:"직접인건비 소계",kind:"money",val:function(c){return c.directSum;},f:function(){return "=SUM(R[-6]C:R[-1]C)";}},

/* 목표 총액(부가세별도)에 맞는 기본급여 배율을 이분법으로 역산 */
function qFindFactor(rows,s,catalog,target){
  if(!(target>0)) return 1;
  function tot(f){ return qCalcAll(rows.map(function(r){return Object.assign({},r,{basic:r0((Number(r.basic)||0)*f)});}),s,catalog).totalExVat; }
  var lo=0, hi=1;
  var guard=0; while(tot(hi)<target && hi<100000 && guard<40){ hi*=2; guard++; }
  for(var i=0;i<50;i++){ var mid=(lo+hi)/2; if(tot(mid)<target) lo=mid; else hi=mid; }
  return (lo+hi)/2;
}

        <div style={sumCard}><div style={sumLbl}>간접인건비 (조정불가)</div><div style={Object.assign({},sumVal,{color:INK})}>{won(agg.totalIndirect)}</div></div>
        <div style={sumCard}><div style={sumLbl}>총 견적금액 (부가세 별도)</div><div style={sumVal}>{won(agg.totalExVat)}</div></div>
        <div style={Object.assign({},sumCard,{background:BLUE,border:"1px solid "+BLUE})}><div style={Object.assign({},sumLbl,{color:"#bcd0e6"})}>총 견적금액 (부가세 포함)</div><div style={Object.assign({},sumVal,{color:"#fff"})}>{won(agg.totalInVat)}</div></div>
      </div>

      {/* 1. 인원 · 근무시간 */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13}}>
          <div style={secHd}><span style={secNo}>1</span><span style={secTt}>인원 · 근무시간</span></div>
          <button style={bPri} onClick={addRow}>+ 인원 추가</button>
        </div>
        <div style={{fontSize:11.5,color:SUB,marginBottom:10}}>「+ 인원 추가」로 직군을 하나씩 추가하세요. 추가 시 ④기타비용에 제경비·기타경비 입력란이 1줄씩 함께 생성됩니다.</div>
        {empty ? <div style={emptyBox}>아직 등록된 인원이 없습니다. 오른쪽 위 <b style={{color:BLUE}}>「+ 인원 추가」</b> 를 눌러 시작하세요.</div> :
        <div style={tableWrap}><table style={tbl}>
          <thead><tr>
            <th style={thL}>직군/구분</th><th style={thC}>업무 구분</th><th style={thC}>근무형태</th><th style={thS}>인원 수</th><th style={thS}>기본근로시간</th><th style={thS}>소정근로시간</th><th style={thS}>시간급</th><th style={thS}>통상시급</th><th style={thC}></th>
          </tr></thead>
          <tbody>{rows.map(function(r){
            var c=qCalcRow(r,set);
            return <tr key={r.id}>
              <td style={tdL}><TxtInput w={130} value={r.label} ph="직군명 입력" onChange={function(v){updRow(r.id,"label",v);}} /></td>
              <td style={tdC}><select value={r.area} onChange={function(e){updRow(r.id,"area",e.target.value);}} style={{padding:"6px 6px",borderRadius:5,border:"1px solid "+LINE,fontSize:12.5}}>{areas.map(function(a){return <option key={a} value={a}>{a}</option>;})}</select></td>
              <td style={tdC}><select value={r.workType} onChange={function(e){setWorkType(r.id,e.target.value);}} style={{padding:"6px 6px",borderRadius:5,border:"1px solid "+LINE,fontSize:12.5}}><option value="week">주간직</option><option value="shift">교대직</option></select></td>
              <td style={tdS}><NumInput w={54} value={r.count} onChange={function(v){updRow(r.id,"count",v);}} /></td>
              <td style={tdS}><NumInput w={66} value={r.baseHours} onChange={function(v){updRow(r.id,"baseHours",v);}} /></td>
              <td style={tdS}><NumInput w={54} value={r.stdHours} onChange={function(v){updRow(r.id,"stdHours",v);}} /></td>
              <td style={Object.assign({},tdS,{fontWeight:600,color:c.belowMin?WARN:INK})}>{nf(c.hourly)}{c.belowMin&&<div style={{fontSize:9.5,color:WARN,marginTop:2}}>최저시급 미만</div>}</td>
              <td style={Object.assign({},tdS,{fontWeight:700})}>{nf(c.common)}</td>
              <td style={tdC}><DelBtn onClick={function(){delRow(r.id);}} /></td>
            </tr>;
          })}</tbody>
        </table></div>}
        {!empty && <div style={{fontSize:11,color:SUB,marginTop:8,lineHeight:1.7}}>🔹 기본근로시간: 주간직 {set.weekHours} / 교대직 {set.shiftHours} (근무형태 선택 시 자동 입력, 수정 가능)<br/>🔹 <b style={{color:INK}}>시간급</b> = ROUND(기본급여 ÷ 기본근로시간)<br/>🔹 <b style={{color:INK}}>통상시급</b> = ROUND((기본급여+직책수당) ÷ 기본근로시간) → <b style={{color:BLUE}}>②기본급여</b> 입력 시 자동 계산</div>}
      </div>

      {/* 2. 직접인건비 */}
      <div style={card}>
        <div style={secHd}><span style={secNo}>2</span><span style={secTt}>직접인건비 계산</span></div>
        {empty ? <div style={emptyBox}>① 인원을 먼저 추가하세요.</div> :
        <div style={{width:"100%"}}><table style={{borderCollapse:"collapse",width:"100%",tableLayout:"fixed"}}>
          <colgroup>
            <col style={{width:"12%"}} /><col style={{width:"11%"}} /><col style={{width:"10%"}} /><col style={{width:"8%"}} /><col style={{width:"10%"}} /><col style={{width:"8%"}} /><col style={{width:"10%"}} /><col style={{width:"6%"}} /><col style={{width:"8%"}} /><col style={{width:"8%"}} /><col style={{width:"9%"}} />
          </colgroup>
          <thead><tr>
            <th style={thF2L}>직군</th><th style={thF2}>기본급여</th><th style={thF2}>직책·자격수당</th><th style={thF2}>연장(h)</th><th style={thF2c}>연장근로수당 ƒ</th><th style={thF2}>야간(h)</th><th style={thF2c}>야간근로수당 ƒ</th><th style={thF2}>연차일</th><th style={thF2c}>연차수당 ƒ</th><th style={thF2c}>퇴직충당금 ƒ</th><th style={thF2c}>소계 ƒ</th>
          </tr></thead>
          <tbody>{rows.map(function(r){
            var c=qCalcRow(r,set);
            return <tr key={r.id}>
              <td style={tdF2L}>{r.label||<span style={{color:SUB,fontWeight:400}}>(직군명)</span>} <span style={{color:SUB,fontWeight:400}}>×{r.count}</span></td>
              <td style={tdF2}><NumInput w="100%" value={r.basic} onChange={function(v){updRow(r.id,"basic",v);}} /></td>
              <td style={tdF2}><NumInput w="100%" value={r.posPay} onChange={function(v){updRow(r.id,"posPay",v);}} /></td>
              <td style={tdF2}><div style={{display:"flex",alignItems:"center",gap:3,justifyContent:"center"}}><input type="checkbox" checked={r.otApply} onChange={function(e){updRow(r.id,"otApply",e.target.checked);}} title="적용(미체크=해당없음)" /><NumInput w={36} value={r.otHours} onChange={function(v){updRow(r.id,"otHours",v);}} /></div></td>
              <td style={r.otApply?tdF2c:Object.assign({},tdF2c,{color:SUB,fontWeight:400})}>{r.otApply?nf(c.ot):"해당없음"}</td>
              <td style={tdF2}><div style={{display:"flex",alignItems:"center",gap:3,justifyContent:"center"}}><input type="checkbox" checked={r.ntApply} onChange={function(e){updRow(r.id,"ntApply",e.target.checked);}} title="적용(미체크=해당없음)" /><NumInput w={36} value={r.ntHours} onChange={function(v){updRow(r.id,"ntHours",v);}} /></div></td>
              <td style={r.ntApply?tdF2c:Object.assign({},tdF2c,{color:SUB,fontWeight:400})}>{r.ntApply?nf(c.nt):"해당없음"}</td>
              <td style={tdF2}><NumInput w="100%" value={r.annualDays} onChange={function(v){updRow(r.id,"annualDays",v);}} /></td>
              <td style={tdF2c}>{nf(c.annual)}</td>
              <td style={tdF2c}>{nf(c.retire)}</td>
              <td style={Object.assign({},tdF2c,{fontWeight:800})}>{nf(c.directSum)}</td>
            </tr>;
          })}</tbody>
          <tfoot><tr><td style={Object.assign({},tfL,{fontSize:11})}>합계</td><td colSpan="9" style={tfR}></td><td style={Object.assign({},tfR,{fontSize:11})}>{nf(agg.calc.reduce(function(a,c){return a+c.directSum*c.count;},0))}</td></tr></tfoot>
        </table></div>}
        {!empty && <div style={{fontSize:11,color:SUB,marginTop:8,lineHeight:1.7}}><span style={{background:"#eaf2fb",color:"#013a73",fontWeight:700,padding:"1px 7px",borderRadius:4}}>ƒ 음영 = 자동 계산 항목</span> (연장·야간·연차수당, 퇴직충당금, 소계는 입력값이 아니라 아래 수식으로 자동 산출됩니다)<br/>🔹 연장 = ROUND((통상시급×소정근로시간)×연장시간÷12, -1)　🔹 야간 = ROUND(야간시간×통상시급×0.5, -1)　🔹 연차 = ROUND(소정근로시간×통상시급×연차일÷12, -1)　🔹 퇴직충당금 = ROUND(소계(기본급여~연차수당)÷12, -1)</div>}
      </div>

      {/* 3. 간접인건비 */}
      <div style={card}>
        <div style={secHd}><span style={secNo}>3</span><span style={secTt}>간접인건비 계산 (4대보험 + 세금)</span></div>
        {empty ? <div style={emptyBox}>① 인원을 먼저 추가하세요.</div> :
        <div style={tableWrap}><table style={tbl}>
          <thead><tr>
            <th style={thL}>직군</th><th style={thS}>국민연금</th><th style={thS}>산재보험</th><th style={thS}>건강보험</th><th style={thS}>고용보험</th><th style={thS}>장기요양</th><th style={thS}>사업소세</th><th style={thS}>소계</th>
          </tr></thead>
          <tbody>{rows.map(function(r){
            var c=qCalcRow(r,set);
            return <tr key={r.id}>
              <NameCell label={r.label} count={r.count} />
              <td style={tdS}>{nf(c.pension)}</td><td style={tdS}>{nf(c.accident)}</td><td style={tdS}>{nf(c.health)}</td>
              <td style={tdS}>{nf(c.employ)}</td><td style={tdS}>{nf(c.care)}</td><td style={tdS}>{nf(c.bizTax)}</td>
              <td style={Object.assign({},tdS,{fontWeight:700})}>{nf(c.indirectSum)}</td>
            </tr>;
          })}</tbody>
          <tfoot><tr><td style={tfL}>합계</td><td colSpan="6" style={tfR}></td><td style={tfR}>{nf(agg.totalIndirect)}</td></tr></tfoot>
        </table></div>}
        {!empty && <div style={{fontSize:11,color:SUB,marginTop:8,lineHeight:1.7}}>🔹 국민연금·산재·건강·고용·사업소세 = ROUND((기본급여~연차수당) × 요율, -1)<br/>🔹 국민연금 {set.rPension}% / 산재 {set.rAccident}% / 건강 {set.rHealth}% / 고용 {set.rEmploy}% / 사업소세 {set.rBizTax}%　🔹 장기요양 = ROUND(건강보험 계산값 × {set.rCare}%, -1) (요율은 ⚙ 설정에서 관리)</div>}
      </div>

      {/* 4. 기타 비용 (직군별 개별 입력) */}
      <div style={card}>
        <div style={secHd}><span style={secNo}>4</span><span style={secTt}>기타 비용 (직군별 개별 입력)</span></div>
        <div style={{fontSize:11.5,color:SUB,marginBottom:12}}>각 직군의 <b>업무 구분</b>에 맞는 제경비·기타경비 <b>종류를 선택</b>하면 단가가 자동으로 채워집니다. <b>수량만</b> 입력하세요. 단가는 1인당 기준이며 직군 인원수만큼 적용됩니다. 종류·단가는 오른쪽 <b style={{color:BLUE}}>📋 직군별 단가 설정</b>에서 관리합니다.</div>
        {empty ? <div style={emptyBox}>① 인원을 추가하면 직군별 제경비·기타경비 입력란이 생성됩니다.</div> :
        <div>
          {rows.map(function(r,i){
            var c=agg.calc[i];
            return <div key={r.id} style={{border:"1px solid "+LINE,borderRadius:7,padding:12,marginBottom:10}}>
              <div style={{fontSize:12.5,fontWeight:700,color:INK,marginBottom:10,paddingBottom:8,borderBottom:"1px solid "+LINE,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                <span>{r.label||<span style={{color:SUB}}>(직군명)</span>} <span style={{fontWeight:600,color:BLUE,fontSize:11,background:BLUEL,padding:"2px 8px",borderRadius:10}}>{r.area}</span> <span style={{color:SUB,fontWeight:400}}>× {r.count}명</span></span>
                <span style={{fontWeight:400,color:SUB}}>1인당 기타 <b style={{color:INK}}>{won(c.etc)}</b> · 직군 합계 <b style={{color:BLUE}}>{won(c.rowEtc)}</b></span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}><span style={{fontSize:12,fontWeight:700,color:INK}}>제경비 (1인당)</span><button style={bSm} onClick={function(){addGenItem(r.id);}}>+ 행 추가</button></div>
                  <table style={stbl}><thead><tr><th style={Object.assign({},thL,{fontSize:10.5})}>종류</th><th style={Object.assign({},thS,{fontSize:10.5})}>단가(자동)</th><th style={Object.assign({},thS,{fontSize:10.5})}>수량</th><th style={Object.assign({},thS,{fontSize:10.5})}>금액</th><th style={thC}></th></tr></thead>
                    <tbody>{r.genItems.map(function(g){
                      var arc=catalog[r.area]||catalog[Object.keys(catalog)[0]]||{gen:[],oth:[]}; var cg=arc.gen||[];
                      var gu=qUnit(cg,g.nm);
                      return <tr key={g.id}>
                        <td style={tdL}><select value={g.nm} onChange={function(e){selGenItem(r.id,g.id,e.target.value);}} style={{width:118,padding:"6px",borderRadius:5,border:"1px solid "+LINE,fontSize:12}}><option value="">종류 선택</option>{cg.map(function(x){return <option key={x.id} value={x.nm}>{x.nm}</option>;})}</select></td>
                        <td style={tdS}>{g.nm?nf(gu):<span style={{color:SUB}}>-</span>}</td>
                        <td style={tdS}><NumInput w={42} value={g.qty} onChange={function(v){updGenItem(r.id,g.id,"qty",v);}} /></td>
                        <td style={Object.assign({},tdS,{fontWeight:600})}>{nf(gu*(Number(g.qty)||0))}</td>
                        <td style={tdC}><DelBtn onClick={function(){delGenItem(r.id,g.id);}} /></td>
                      </tr>;
                    })}</tbody>
                    <tfoot><tr><td style={tfL} colSpan="3">제경비 (1인당)</td><td style={tfR} colSpan="2">{nf(c.etcGenPer)}</td></tr></tfoot>
                  </table>
                </div>
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}><span style={{fontSize:12,fontWeight:700,color:INK}}>기타경비 (1인당)</span><button style={bSm} onClick={function(){addOthItem(r.id);}}>+ 행 추가</button></div>
                  <table style={stbl}><thead><tr><th style={Object.assign({},thL,{fontSize:10.5})}>종류</th><th style={Object.assign({},thS,{fontSize:10.5})}>단가(자동)</th><th style={Object.assign({},thS,{fontSize:10.5})}>수량</th><th style={Object.assign({},thS,{fontSize:10.5})}>금액</th><th style={thC}></th></tr></thead>
                    <tbody>{r.othItems.map(function(o){
                      var arc2=catalog[r.area]||catalog[Object.keys(catalog)[0]]||{gen:[],oth:[]}; var co=arc2.oth||[];
                      var ou=qUnit(co,o.nm);
                      return <tr key={o.id}>
                        <td style={tdL}><select value={o.nm} onChange={function(e){selOthItem(r.id,o.id,e.target.value);}} style={{width:118,padding:"6px",borderRadius:5,border:"1px solid "+LINE,fontSize:12}}><option value="">종류 선택</option>{co.map(function(x){return <option key={x.id} value={x.nm}>{x.nm}</option>;})}</select></td>
                        <td style={tdS}>{o.nm?nf(ou):<span style={{color:SUB}}>-</span>}</td>
                        <td style={tdS}><NumInput w={42} value={o.qty} onChange={function(v){updOthItem(r.id,o.id,"qty",v);}} /></td>
                        <td style={Object.assign({},tdS,{fontWeight:600})}>{nf(ou*(Number(o.qty)||0))}</td>
                        <td style={tdC}><DelBtn onClick={function(){delOthItem(r.id,o.id);}} /></td>
                      </tr>;
                    })}</tbody>
                    <tfoot><tr><td style={tfL} colSpan="3">기타경비 (1인당)</td><td style={tfR} colSpan="2">{nf(c.etcOthPer)}</td></tr></tfoot>
                  </table>
                </div>
              </div>
            </div>;
          })}
          <div style={{display:"flex",justifyContent:"flex-end",padding:"10px 14px",background:BLUEL,borderRadius:6}}>
            <span style={{fontSize:13,fontWeight:700,color:INK}}>기타 비용 총계 <span style={{color:BLUE}}>{won(agg.etcTotal)}</span></span>
          </div>
        </div>}
      </div>

      {/* 5. 중계 */}
      <div style={card}>
        <div style={secHd}><span style={secNo}>5</span><span style={secTt}>중계 계산 (직접인건비 + 간접인건비 + 기타비용)</span></div>
        {empty ? <div style={emptyBox}>① 인원을 먼저 추가하세요.</div> :
        <div style={tableWrap}><table style={tbl}>
          <thead><tr><th style={thL}>직군</th><th style={thS}>직접인건비</th><th style={thS}>간접인건비</th><th style={thS}>기타비용(1인)</th><th style={thS}>중계</th></tr></thead>
          <tbody>{rows.map(function(r,i){
            var c=agg.calc[i];
            return <tr key={r.id}><NameCell label={r.label} count={r.count} /><td style={tdS}>{nf(c.directSum)}</td><td style={tdS}>{nf(c.indirectSum)}</td><td style={tdS}>{nf(c.etc)}</td><td style={Object.assign({},tdS,{fontWeight:700})}>{nf(c.junggye)}</td></tr>;
          })}</tbody>
          <tfoot><tr><td style={tfL}>합계 (1인 단가 합)</td><td style={tfR}>{nf(agg.calc.reduce(function(a,c){return a+c.directSum;},0))}</td><td style={tfR}>{nf(agg.calc.reduce(function(a,c){return a+c.indirectSum;},0))}</td><td style={tfR}>{nf(agg.calc.reduce(function(a,c){return a+c.etc;},0))}</td><td style={tfR}>{nf(agg.calc.reduce(function(a,c){return a+c.junggye;},0))}</td></tr></tfoot>
        </table></div>}
      </div>

      {/* 6. 이윤 + 월간 합계 */}
      <div style={card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:13,flexWrap:"wrap",gap:10}}>
          <div style={secHd}><span style={secNo}>6</span><span style={secTt}>이윤 · 월간 합계</span></div>
          <div style={{display:"flex",gap:14}}>
            <div><label style={lblS}>일반관리비 (%)</label><PctInput w={84} value={set.adminRate} onChange={function(v){updSet("adminRate",v);}} /></div>
            <div><label style={lblS}>기업이윤 (%)</label><PctInput w={84} value={set.profitRate} onChange={function(v){updSet("profitRate",v);}} /></div>
          </div>
        </div>
        {empty ? <div style={emptyBox}>① 인원을 먼저 추가하세요.</div> :
        <div style={tableWrap}><table style={tbl}>
          <thead><tr><th style={thL}>직군</th><th style={thS}>중계</th><th style={thS}>일반관리비</th><th style={thS}>기업이윤</th><th style={thS}>부가세별도(1인)</th><th style={thS}>부가세포함(1인)</th><th style={thS}>인원</th><th style={thS}>행 합계(부가세별도)</th></tr></thead>
          <tbody>{rows.map(function(r,i){
            var c=agg.calc[i];
            return <tr key={r.id}><NameCell label={r.label} count={r.count} /><td style={tdS}>{nf(c.junggye)}</td><td style={tdS}>{nf(c.admin)}</td><td style={tdS}>{nf(c.profit)}</td><td style={Object.assign({},tdS,{fontWeight:700})}>{nf(c.exVat)}</td><td style={tdS}>{nf(c.inVat)}</td><td style={tdC}>{c.count}</td><td style={Object.assign({},tdS,{fontWeight:700,color:BLUE})}>{nf(c.rowExVat)}</td></tr>;
          })}</tbody>

                  <tbody>{list.map(function(x){return <tr key={x.id}>
                    <td style={tdL}><TxtInput w="100%" value={x.nm} ph="종류명" onChange={function(v){updCat(catTab,tp[0],x.id,"nm",v);}} /></td>
                    <td style={tdS}><NumInput w={100} value={x.unit} onChange={function(v){updCat(catTab,tp[0],x.id,"unit",v);}} /></td>
                    <td style={tdC}><DelBtn onClick={function(){delCat(catTab,tp[0],x.id);}} /></td>
                  </tr>;})}</tbody>
                </table>
                {list.length===0 && <div style={{fontSize:11,color:SUB,padding:"10px 0",textAlign:"center"}}>등록된 종류가 없습니다. + 종류 추가</div>}
              </div>;
            })}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:18}}><button style={bPri} onClick={function(){setShowCat(false);doToast("단가 설정이 저장되었습니다.");}}>완료</button></div>
        </div>
      </div>}

      {toast && <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:BLUED,color:"#fff",padding:"11px 26px",borderRadius:8,fontSize:13,fontWeight:600,boxShadow:"0 6px 24px rgba(0,0,0,.2)",zIndex:2000}}>{toast}</div>}
    </div>
  );
}

document.getElementById("loading").style.display="none";
ReactDOM.createRoot(document.getElementById("root")).render(<QuotationPage/>);
} catch(err) {
  document.getElementById("loading").style.display="none";
  var eb=document.getElementById("error-box");
  eb.style.display="block";
  eb.innerHTML="<h2>앱 실행 오류</h2><pre>"+err.message+"\n"+err.stack+"</pre>";
}
</script>
</body>
</html>
